# netlify.toml  ── 사이트 폴더 맨 위(루트)에 둡니다

[functions]
  directory = "netlify/functions"

# /api 로 들어온 요청을 프록시 함수로 넘김 (주소는 그대로, 내용만 중계: status 200)
[[redirects]]
  from = "/api"
  to = "/.netlify/functions/proxy"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/proxy"
  status = 200
  force = true
