// 🆕 학생 개별 리포트 (월간 종합 + 주간별)
// ════════════════════════════════════════════
let _reportStudent = null;
let _reportMonthOffset = 0; // 🆕 V7: 0=이번 달, -1=지난 달, -2=두 달 전...

async function openStudentReport(studentName, monthOffset) {
  _reportStudent = studentName;
  if (monthOffset !== undefined) _reportMonthOffset = monthOffset;
  document.getElementById('reportTitle').textContent = `📊 ${studentName} 학습 리포트`;
  document.getElementById('reportOv').style.display = 'flex';

  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth() + _reportMonthOffset;
  const monthStart = new Date(y, m, 1);
  const monthEnd = new Date(y, m + 1, 0);
  const monthLbl = `${monthStart.getFullYear()}년 ${monthStart.getMonth()+1}월`;
  document.getElementById('reportSub').textContent = `📅 ${monthLbl}`;

  const body = document.getElementById('reportBody');
  body.innerHTML = '<div class="loading-state"><span class="spin"></span>한 달치 학습 데이터 불러오는 중...</div>';

  const res = await sheetFetch({ action: 'read' });
  if (!res || !res.success) {
    body.innerHTML = '<div class="empty-state"><div class="ei">📡</div>데이터를 불러올 수 없어요.<br>네트워크를 확인해주세요.</div>';
    return;
  }
  const all = res.logs || [];
  const myLogs = all.filter(l => {
    if (l.name !== studentName) return false;
    if (!l.date) return false;
    const d = new Date(l.date);
    return d >= monthStart && d <= monthEnd;
  });

  // 🆕 자주 틀리는 단어 (월 필터는 renderStudentReport에서 처리, 넉넉히 조회)
  let wrongs = [];
  try {
    const wres = await sheetFetch({ action: 'getMyWrongs', name: studentName, days: 400 });
    if (wres && wres.success) wrongs = wres.wrongs || [];
  } catch (e) {}

  renderStudentReport(myLogs, monthStart, monthEnd, wrongs);
}

function renderStudentReport(logs, monthStart, monthEnd, wrongs) {
  const body = document.getElementById('reportBody');
  // 통계 집계
  const totalSessions = logs.length;
  const totalMinutes = logs.reduce((s,l) => s + (+l.studyMinutes || 0), 0);
  const uniqueDates = new Set(logs.map(l => l.date)).size;
  const wordCnt = logs.filter(l => l.wordStudy).length;
  const mcqCnt  = logs.filter(l => l.mcqQuiz).length;
  const wrCnt   = logs.filter(l => l.writingQuiz).length;
  const wTodayCnt = logs.filter(l => l.wrongToday).length;
  const w3dCnt    = logs.filter(l => l.wrong3days).length;
  const w1wCnt    = logs.filter(l => l.wrong1week).length;
  const w2wCnt    = logs.filter(l => l.wrong2weeks).length;
  const wAnyCnt = logs.filter(l => l.wrongToday||l.wrong3days||l.wrong1week||l.wrong2weeks).length;

  // 주간별 집계 (월 첫째날부터 7일씩)
  const weeks = [];
  let wStart = new Date(monthStart);
  let weekNum = 1;
  while (wStart <= monthEnd) {
    let wEnd = new Date(wStart);
    wEnd.setDate(wEnd.getDate() + 6);
    if (wEnd > monthEnd) wEnd = new Date(monthEnd);
    const weekLogs = logs.filter(l => {
      const d = new Date(l.date);
      return d >= wStart && d <= wEnd;
    });
    weeks.push({
      label: `${weekNum}주차 (${wStart.getMonth()+1}/${wStart.getDate()}~${wEnd.getMonth()+1}/${wEnd.getDate()})`,
      sessions: weekLogs.length,
      minutes: weekLogs.reduce((s,l)=>s+(+l.studyMinutes||0),0),
      word: weekLogs.some(l=>l.wordStudy)?'O':'X',
      mcq:  weekLogs.some(l=>l.mcqQuiz)?'O':'X',
      write:weekLogs.some(l=>l.writingQuiz)?'O':'X',
      wrong:weekLogs.some(l=>l.wrongToday||l.wrong3days||l.wrong1week||l.wrong2weeks)?'O':'X'
    });
    wStart.setDate(wStart.getDate() + 7);
    weekNum++;
  }

  // 🆕 V7: 월 선택 옵션 (이번 달~6개월 전)
  const monthBtns = [];
  for (let off = 0; off >= -6; off--) {
    const d = new Date();
    d.setMonth(d.getMonth() + off);
    const label = off === 0 ? '이번 달' : `${d.getFullYear()}년 ${d.getMonth()+1}월`;
    const isOn = off === _reportMonthOffset;
    monthBtns.push(`<button class="ws-period ${isOn?'on':''}" onclick="openStudentReport('${esc(_reportStudent).replace(/'/g,"\\'")}', ${off})">${label}</button>`);
  }

  // 🆕 단어장(학습유형) 분포 집계
  const bookMap = {};
  logs.forEach(l => {
    const t = l.learnType || 'basic';
    let key, label, cls;
    if (t === 'set' && l.learnInfo) { key = 's:' + l.learnInfo; label = l.learnInfo; cls = 'set'; }
    else if (t === 'weekly' && l.learnInfo) { key = 'w:' + l.learnInfo; label = (String(l.learnInfo) === '5' ? '5주차(복습)' : l.learnInfo + '주차'); cls = 'week'; }
    else { key = 'basic'; label = '기본'; cls = 'basic'; }
    if (!bookMap[key]) bookMap[key] = { label, cls, n: 0 };
    bookMap[key].n++;
  });
  const books = Object.values(bookMap).sort((a, b) => b.n - a.n);

  // 🆕 자주 틀리는 단어 TOP 5 (이번 달 + 영어단어별 합산)
  const wmap = {};
  (wrongs || []).forEach(w => {
    if (!w.date) return;
    const d = new Date(w.date);
    if (d < monthStart || d > monthEnd) return;
    const k = String(w.eng || '').toLowerCase().trim();
    if (!k) return;
    if (!wmap[k]) wmap[k] = { eng: w.eng, kor: w.kor || '', cnt: 0 };
    wmap[k].cnt += (+w.count || 1);
  });
  const topWrong = Object.values(wmap).sort((a, b) => b.cnt - a.cnt).slice(0, 5);

  // 🆕 격려 메시지
  let cheer;
  if (uniqueDates === 0) cheer = '이 달은 아직 학습 기록이 없어요. 오늘 한 번 시작해볼까요?';
  else if (uniqueDates >= 8) cheer = `이번 달 벌써 <b>${uniqueDates}일</b> 공부했어요. 정말 잘하고 있어요!`;
  else cheer = `이번 달 <b>${uniqueDates}일</b> 공부했어요. 꾸준히 가봐요!`;

  body.innerHTML = `
    <div class="report-actions">
      <button class="worksheet-btn" onclick="openWorksheetPicker()">📝 틀린단어 학습지 만들기</button>
      <button class="print-btn" onclick="printReport()">🖨️ 리포트 인쇄</button>
    </div>

    <div class="report-sec">📅 월 선택</div>
    <div class="ws-period-row">${monthBtns.join('')}</div>

    <div class="rpt-banner"><span class="rb-ic">🔥</span><span>${cheer}</span></div>

    <div class="report-sec">📊 월간 학습 종합</div>
    <div class="month-grid">
      <div class="month-cell"><div class="n">${uniqueDates}</div><div class="l">학습한 날</div></div>
      <div class="month-cell green"><div class="n">${totalSessions}</div><div class="l">총 세션</div></div>
      <div class="month-cell amber"><div class="n">${totalMinutes}분</div><div class="l">총 학습시간</div></div>
    </div>
    <div class="month-grid" style="margin-top:8px">
      <div class="month-cell"><div class="n">${wordCnt}</div><div class="l">단어공부</div></div>
      <div class="month-cell purple"><div class="n">${mcqCnt}</div><div class="l">객관식</div></div>
      <div class="month-cell pink"><div class="n">${wrCnt}</div><div class="l">쓰기</div></div>
    </div>

    <div class="report-sec">📚 내가 공부한 단어장</div>
    ${books.length
      ? `<div class="book-chips">${books.map(b => `<span class="bchip ${b.cls}">${esc(b.label)}<span class="bn">${b.n}회</span></span>`).join('')}</div>`
      : `<div class="rpt-empty">아직 단어장 선택 기록이 없어요.</div>`}

    <div class="report-sec">⚠️ 자주 틀리는 단어 TOP 5</div>
    ${topWrong.length
      ? `<div class="wrong-top">${topWrong.map(w => `<div class="wrong-row"><span class="we">${esc(w.eng)}</span><span class="wk">${esc(w.kor)}</span><span class="wc ${w.cnt>=3?'':'amber'}">${w.cnt}번 틀림</span></div>`).join('')}</div>
         <button class="retry-wrong-btn" onclick="closeReport();goTab('wrong')">🔄 이 단어들 다시 풀기</button>`
      : `<div class="rpt-empty">이번 달 틀린 단어가 없어요. 완벽해요! 👏</div>`}

    <div class="report-sec">❌ 틀단테스트 참여 (옵션별)</div>
    <div class="month-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="month-cell red"><div class="n">${wTodayCnt}</div><div class="l">오늘</div></div>
      <div class="month-cell red"><div class="n">${w3dCnt}</div><div class="l">3일</div></div>
      <div class="month-cell red"><div class="n">${w1wCnt}</div><div class="l">1주</div></div>
      <div class="month-cell red"><div class="n">${w2wCnt}</div><div class="l">2주</div></div>
    </div>

    <div class="report-sec">📈 주간별 학습 데이터</div>
    <div style="overflow-x:auto">
      <table class="week-tbl">
        <thead><tr><th>주차</th><th>세션</th><th>학습</th><th>단어</th><th>객관식</th><th>쓰기</th><th>틀단</th></tr></thead>
        <tbody>
          ${weeks.map(w => `<tr>
            <td class="wk-label">${w.label}</td>
            <td>${w.sessions||'—'}</td>
            <td>${w.minutes?w.minutes+'분':'—'}</td>
            <td><span class="${w.word==='O'?'ox-o':'ox-x'}">${w.word}</span></td>
            <td><span class="${w.mcq==='O'?'ox-o':'ox-x'}">${w.mcq}</span></td>
            <td><span class="${w.write==='O'?'ox-o':'ox-x'}">${w.write}</span></td>
            <td><span class="${w.wrong==='O'?'ox-o':'ox-x'}">${w.wrong}</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function closeReport() {
  document.getElementById('reportOv').style.display = 'none';
  _reportStudent = null;
}

let _wsPeriod = 7; // 기본 1주일

function openWorksheetPicker() {
  if (!_reportStudent) return;
  // 기간 선택 화면 먼저 띄움
  document.getElementById('wsTitle').textContent = `📝 ${_reportStudent} — 틀린단어 학습지`;
  document.getElementById('wsOv').style.display = 'flex';
  document.getElementById('wsContent').innerHTML = `
    <div style="text-align:center;padding:20px 12px">
      <div style="font-size:14.5px;font-weight:800;color:var(--text);margin-bottom:8px;font-family:'Jua',sans-serif">📅 어느 기간의 틀린 단어로 만들까요?</div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:18px">선택한 기간 동안 ${esc(_reportStudent)}님이 틀린 단어로 학습지를 만듭니다.</div>
      <div class="ws-period-row" style="justify-content:center">
        <button class="ws-period ${_wsPeriod===1?'on':''}" onclick="setWsPeriod(1)">오늘</button>

        <button class="ws-period ${_wsPeriod===14?'on':''}" onclick="setWsPeriod(14)">2주일</button>
        <button class="ws-period ${_wsPeriod===30?'on':''}" onclick="setWsPeriod(30)">한 달</button>
      </div>
      <button class="worksheet-btn" style="margin-top:10px;font-size:14px;padding:12px 28px" onclick="generateWorksheet()">▶ 학습지 만들기</button>

  `;
}

function setWsPeriod(days) {
  _wsPeriod = days;
  openWorksheetPicker(); // 다시 그려서 'on' 표시 갱신
}

async function generateWorksheet() {
  if (!_reportStudent) return;
  const content = document.getElementById('wsContent');
  content.innerHTML = '<div class="loading-state"><span class="spin"></span>오답 단어 불러오는 중...</div>';

  const res = await sheetFetch({ action: 'getMyWrongs', name: _reportStudent, days: _wsPeriod });
  if (!res || !res.success) {
    content.innerHTML = '<div class="ws-empty"><div class="ei">📡</div>오답 단어를 불러올 수 없어요.<br>다시 시도해주세요.</div>';
    return;
  }
  let wrongs = res.wrongs || [];

  // 중복 제거 (영어 단어 기준)
  const merged = {};
  wrongs.forEach(w => {
    const key = (w.eng||'').toLowerCase().trim();
    if (!key) return;
    if (!merged[key]) merged[key] = { ...w, count: 0 };
    merged[key].count += w.count || 1;
  });
  wrongs = Object.values(merged).sort((a,b) => b.count - a.count);

  // 🆕 단어장(WDB)에서 발음기호 보충 — 오답 시트엔 pron 컬럼이 없으므로
  wrongs.forEach(w => {
    if (!w.pron && Array.isArray(WDB)) {
      const match = WDB.find(x => x.eng && x.eng.toLowerCase() === w.eng.toLowerCase());
      if (match && match.pron) w.pron = match.pron;
    }
  });

  if (!wrongs.length) {
    const periodLbl = {1:'오늘',3:'최근 3일',7:'최근 1주일',14:'최근 2주일',30:'최근 한 달'}[_wsPeriod];
    content.innerHTML = `<div class="ws-empty"><div class="ei">🎉</div>${periodLbl} 동안 틀린 단어가 없어요!<br><span style="font-size:12px;color:var(--blue);margin-top:6px;display:block">학생이 다른 기간을 선택해보세요.</span></div>`;
    return;
  }

  renderWorksheet(wrongs);
}

function renderWorksheet(words) {
  const periodLbl = {1:'오늘',3:'최근 3일',7:'최근 1주일',14:'최근 2주일',30:'최근 한 달'}[_wsPeriod];
  const today = dk();
  const content = document.getElementById('wsContent');

  // 한 단어당 4선지 5줄
  const blocks = words.map((w, i) => {
    const lines = [];
    for (let k = 0; k < 2; k++) { // 🆕 V7: 2행으로 변경 (간격 여유)
      // 첫 줄에 회색 가이드 단어 표시 (선택)
      const guide = k === 0 ? `<span class="alpha-word-guide">${esc(w.eng)}</span>` : '';
      lines.push(`<div class="alpha-line"><div class="l-dot"></div><div class="l-red"></div>${guide}</div>`);
    }
    return `
      <div class="ws-word-block">
        <div class="ws-word-head">
          <span class="ws-word-num">${i+1}.</span>
          <span class="ws-word-eng">${esc(w.eng)}</span>
          ${w.pron ? `<span class="ws-word-pron">${esc(w.pron)}</span>` : ''}
          <span class="ws-word-kor">— ${esc(w.kor)}</span>
        </div>
        ${lines.join('')}
      </div>
    `;
  }).join('');

  content.innerHTML = `
    <div class="ws-print-header">
      <h1>📝 틀린단어 쓰기 학습지</h1>
      <div style="font-size:11.5px;color:var(--muted);font-weight:700">GnB연세스타 권곡캠퍼스</div>
      <div class="ws-meta">
        <span>이름: <strong>${esc(_reportStudent)}</strong></span>
        <span>날짜: <strong>${today}</strong></span>
        <span>기간: <strong>${periodLbl}</strong></span>
        <span>단어: <strong>${words.length}개</strong></span>
      </div>
    </div>
    ${blocks}
    <div style="margin-top:20px;padding-top:14px;border-top:1px dashed var(--border);font-size:11.5px;color:var(--muted);font-weight:700;text-align:right">
      부모님 확인: ____________________
    </div>
  `;
}

function closeWorksheet() {
  document.getElementById('wsOv').style.display = 'none';
}

// ════════════════════════════════════════════
// PASSWORD
// ════════════════════════════════════════════
function requestList(){
  if(wordsUnlocked){ goTab('list'); return; }
  openPw('words');
}

let pwPurpose=null, wordsUnlocked=false, adminUnlocked=false;
function openPw(p){
  pwPurpose=p;
  const titles={admin:'🛡️ 관리자 인증',words:'🔒 단어장 잠금'};
  const subs={admin:'관리자 비밀번호를 입력하세요',words:'선생님 비밀번호를 입력하세요'};
  document.getElementById('pwTitle').textContent=titles[p]||'🔒 잠금';
  document.getElementById('pwSub').textContent=subs[p]||'비밀번호를 입력하세요';
  document.getElementById('pwInp').value='';
  document.getElementById('pwErr').textContent='';
  document.getElementById('pwOv').style.display='flex';
  setTimeout(()=>document.getElementById('pwInp').focus(),80);
}
function doPw(){
  const v=document.getElementById('pwInp').value.trim();
  if(v===PW){
    document.getElementById('pwOv').style.display='none';
    if(pwPurpose==='words'){ wordsUnlocked=true; goTab('list'); }
    else if(pwPurpose==='admin'){ adminUnlocked=true; document.getElementById('t-admin')||addAdminTab(); goTab('admin'); }
  } else {
    document.getElementById('pwErr').textContent='❌ 틀렸어요!';
    document.getElementById('pwInp').value='';
    document.getElementById('pwInp').focus();
    setTimeout(()=>document.getElementById('pwErr').textContent='',2000);
  }
}
function closePw(){ document.getElementById('pwOv').style.display='none'; }
function addAdminTab(){
  const tabs=document.querySelector('.tabs');
  const t=document.createElement('div');
  t.className='tab'; t.id='t-admin'; t.textContent='🛡️ 관리자';
  t.onclick=()=>goTab('admin');
  tabs.appendChild(t);
}

// ════════════════════════════════════════════
// NAME ENTRY
// ════════════════════════════════════════════
async function goName(){
  const v=document.getElementById('nameInp').value.trim();
  if(!v){
    document.getElementById('nameErr').textContent='이름을 입력해주세요!';
    setTimeout(()=>document.getElementById('nameErr').textContent='',1500);
    return;
  }

  // 🍎 가장 먼저: iOS Speech 잠금 해제 (사용자 터치 컨텍스트 안에서)
  unlockSpeech();

  const btn=document.getElementById('goBtn');
  const loadMsg=document.getElementById('loadingMsg');
  btn.disabled=true;
  btn.textContent='불러오는 중...';
  btn.style.opacity='0.7';
  loadMsg.style.display='block';
  document.getElementById('nameInp').disabled=true;

  await loadWords();

  document.getElementById('nameOv').style.display='none';
  document.getElementById('stuBadge').style.display='inline-flex';
  document.getElementById('stuName').textContent=v;
  startSess(v);
  renderHome();

  btn.disabled=false;
  btn.textContent='시작하기 🚀';
  btn.style.opacity='1';
  loadMsg.style.display='none';
  document.getElementById('nameInp').disabled=false;

  // 🌟 초등 특수: 로그인 직후 단어장 선택 모달 자동 표시
  // (초등 학생은 단어장 선택 화면으로 학습을 시작)
  setTimeout(()=>{
    if (typeof openBookSelectModal === 'function' && !activeMode){
      openBookSelectModal();
    }
  }, 500);
}
