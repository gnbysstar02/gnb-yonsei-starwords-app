<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<!-- 카카오톡 인앱브라우저 → 외부 브라우저(크롬/사파리) 자동 전환 -->
<script>
(function () {
  var ua = navigator.userAgent.toLowerCase();
  if (/kakaotalk/i.test(ua)) {
    var url = window.location.href;
    if (/iphone|ipad|ipod/i.test(ua)) {
      location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(url);
    } else {
      location.href = 'intent://' + url.replace(/https?:\/\//i, '') +
        '#Intent;scheme=https;package=com.android.chrome;end';
    }
  }
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>GnB 단어 학습 — 초등 1-1교시 | 권곡캠퍼스</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&family=Jua&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  /* 🌈 초등용 따뜻한 컬러 팔레트 */
  --blue:#3B82F6;--blue-l:#EFF6FF;--blue-d:#1D4ED8;--blue-xl:#DBEAFE;
  --green:#10B981;--green-l:#ECFDF5;--green-xl:#D1FAE5;
  --amber:#F59E0B;--amber-l:#FFFBEB;--amber-xl:#FEF3C7;
  --red:#EF4444;--red-l:#FEF2F2;
  --purple:#8B5CF6;--purple-l:#FAF5FF;--purple-xl:#EDE9FE;
  --pink:#EC4899;--pink-l:#FDF2F8;--pink-xl:#FCE7F3;
  --yellow:#FDE047;--yellow-l:#FEFCE8;
  --bg:#FFF8F0;--card:#fff;--border:#E2E8F0;--text:#1E293B;--muted:#64748B;
  --shadow:0 4px 20px rgba(59,130,246,.12);
  --shadow-lg:0 8px 32px rgba(59,130,246,.18);
}
html,body{overscroll-behavior:none}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(135deg,#FFF8F0 0%,#FFEEDD 50%,#FFE4E1 100%);
  min-height:100vh; min-height:100dvh; /* 🍎 iOS 주소창 대응 */
  display:flex;justify-content:center;align-items:flex-start;padding:16px 10px}

.app{width:100%;max-width:500px;background:var(--card);border-radius:28px;overflow:hidden;
  box-shadow:var(--shadow-lg);display:flex;flex-direction:column;
  min-height:90vh; min-height:90dvh; /* 🍎 iOS 주소창 대응 */
  position:relative}

/* 🍎 iOS 입력 필드 자동 줌인 방지 — 모바일에서 모든 입력 16px 강제 */
@media (max-width: 500px) {
  input[type="text"], input[type="password"], input[type="email"],
  input[type="number"], input[type="search"], textarea, select {
    font-size: 16px !important;
  }
}

/* ══ OVERLAY ══ */
.ov{position:absolute;inset:0;z-index:200;border-radius:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
.ov-blue{background:linear-gradient(150deg,#3B82F6 0%,#60A5FA 50%,#FDE047 100%)}
.ov-dim{background:rgba(15,23,42,.55);backdrop-filter:blur(6px)}
.mascot{font-size:72px;margin-bottom:14px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.25));animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-12px) rotate(5deg)}}
.ov h2{color:white;font-family:'Jua',sans-serif;font-size:22px;font-weight:400;margin-bottom:4px;letter-spacing:-.3px;text-shadow:0 2px 8px rgba(0,0,0,.2)}
.ov .sub{color:rgba(255,255,255,.85);font-size:13px;margin-bottom:28px;font-weight:500}
.ov-logo{background:white;color:var(--blue-d);font-family:'Nunito',sans-serif;font-weight:900;font-size:22px;padding:8px 18px;border-radius:14px;display:inline-block;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.class-badge{background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.45);color:white;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;padding:7px 16px;border-radius:14px;margin-bottom:14px;display:inline-block;letter-spacing:.3px;text-shadow:0 1px 3px rgba(0,0,0,.2);backdrop-filter:blur(4px)}
.name-inp{width:100%;max-width:280px;border:3px solid rgba(255,255,255,.4);border-radius:18px;padding:16px 20px;font-size:18px;font-weight:700;text-align:center;font-family:'Noto Sans KR',sans-serif;outline:none;background:rgba(255,255,255,.18);color:white;transition:all .2s}
.name-inp::placeholder{color:rgba(255,255,255,.6);font-weight:500}
.name-inp:focus{border-color:white;background:rgba(255,255,255,.28)}
.go-btn{margin-top:16px;background:white;color:var(--blue-d);border:none;border-radius:16px;padding:14px 44px;font-size:17px;font-weight:900;cursor:pointer;font-family:'Jua',sans-serif;box-shadow:0 6px 20px rgba(0,0,0,.25);transition:transform .15s,box-shadow .15s;-webkit-appearance:none}
.go-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(0,0,0,.3)}
.go-btn:active{transform:translateY(0)}
.err{font-size:12px;color:#FEF3C7;min-height:18px;margin-top:8px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.pw-card{background:white;border-radius:20px;padding:28px 24px;width:280px;text-align:center;box-shadow:0 12px 36px rgba(0,0,0,.25)}
.pw-card h3{font-size:16px;font-weight:900;color:var(--text);margin-bottom:6px}
.pw-card p{font-size:12.5px;color:var(--muted);margin-bottom:18px}
.pw-inp{width:100%;border:2px solid var(--border);border-radius:12px;padding:13px;font-size:24px;text-align:center;letter-spacing:14px;outline:none;font-family:'Nunito',sans-serif;font-weight:800;color:var(--text);transition:border .15s}
.pw-inp:focus{border-color:var(--blue)}
.pw-row{display:flex;gap:10px;margin-top:16px}
.pw-ok{flex:1;background:var(--blue);color:white;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:background .15s;-webkit-appearance:none}
.pw-ok:hover{background:var(--blue-d)}
.pw-no{flex:1;background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:12px;padding:12px;font-size:14px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;-webkit-appearance:none}

/* ══ HEADER ══ */
.hd{background:linear-gradient(135deg,#3B82F6 0%,#60A5FA 60%,#93C5FD 100%);padding:14px 16px 12px;color:white;flex-shrink:0;position:relative;overflow:hidden}
.hd::before{content:'⭐';position:absolute;right:-10px;top:-10px;font-size:60px;opacity:.18;transform:rotate(15deg)}
.hd-r1{display:flex;align-items:center;gap:10px;position:relative;z-index:1}
.hd-logo{background:white;color:var(--blue-d);font-family:'Nunito',sans-serif;font-weight:900;font-size:13px;padding:4px 10px;border-radius:9px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.hd-info .t1{font-size:14px;font-weight:800;font-family:'Jua',sans-serif}
.hd-info .t2{font-size:10.5px;color:rgba(255,255,255,.75)}
.hd-right{margin-left:auto;display:flex;align-items:center;gap:6px}
.stu-badge{background:rgba(253,224,71,.22) !important;border:1.5px solid rgba(253,224,71,.6) !important;color:#FDE047 !important;font-size:15px !important;font-weight:900 !important;padding:7px 14px !important;border-radius:12px !important;display:inline-flex;align-items:center;gap:7px;backdrop-filter:blur(8px);text-shadow:0 2px 8px rgba(0,0,0,.4),0 0 12px rgba(253,224,71,.3);letter-spacing:-.3px}
.live-dot{width:7px;height:7px;background:#4ADE80;border-radius:50%;animation:blink 2s infinite;box-shadow:0 0 8px rgba(74,222,128,.6)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.hd-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);color:rgba(255,255,255,.9);font-size:10px;font-weight:700;padding:5px 9px;border-radius:8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;white-space:nowrap;-webkit-appearance:none}
.hd-btn:hover{background:rgba(255,255,255,.32);color:white}
.hd-r2{display:flex;align-items:center;justify-content:space-between;padding:7px 0 2px;border-top:1px solid rgba(255,255,255,.2);margin-top:9px;position:relative;z-index:1}
.book-lbl{font-family:'Jua',sans-serif;font-weight:400;font-size:17px;color:white;letter-spacing:-.3px}
.word-cnt{background:rgba(255,255,255,.25);border:1px solid rgba(255,255,255,.4);color:white;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;cursor:pointer;transition:background .15s}
.word-cnt:hover{background:rgba(255,255,255,.35)}

/* ══ TABS ══ */
.tabs{display:flex;border-bottom:2px solid var(--border);background:white;padding:0 4px;flex-shrink:0;justify-content:space-between;align-items:stretch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;text-align:center;padding:11px 2px;font-size:10.5px;font-weight:800;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap;font-family:'Noto Sans KR',sans-serif;letter-spacing:-.5px;min-width:0}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}

/* ══ MAIN CONTENT ══ */
.main{flex:1;overflow-y:auto;padding:16px 14px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}

/* ══ HOME CARDS ══ */
.home-banner{background:linear-gradient(135deg,#3B82F6 0%,#8B5CF6 100%);border-radius:20px;padding:20px 22px;color:white;position:relative;overflow:hidden;box-shadow:0 6px 20px rgba(59,130,246,.25)}
.home-banner::after{content:'🚀';position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:52px;opacity:.3;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(-50%) translateY(0)}50%{transform:translateY(-50%) translateY(-6px)}}
.home-banner h3{font-size:17px;font-weight:900;margin-bottom:4px;font-family:'Jua',sans-serif}
.home-banner p{font-size:12.5px;color:rgba(255,255,255,.85)}
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.action-card{background:white;border:2px solid var(--border);border-radius:18px;padding:18px 14px;cursor:pointer;transition:all .2s;text-align:center;user-select:none;-webkit-user-select:none}
.action-card:hover{border-color:var(--blue);box-shadow:var(--shadow);transform:translateY(-3px)}
.action-card:active{transform:translateY(-1px)}
.action-card .ic{font-size:36px;margin-bottom:9px;display:block}
.action-card .nm{font-size:14px;font-weight:900;color:var(--text);margin-bottom:3px;font-family:'Jua',sans-serif}
.action-card .desc{font-size:11px;color:var(--muted);font-weight:500}
.action-card.blue{background:var(--blue-l);border-color:#BFDBFE}
.action-card.blue:hover{background:#DBEAFE;border-color:var(--blue)}
.action-card.green{background:var(--green-l);border-color:#6EE7B7}
.action-card.green:hover{background:var(--green-xl);border-color:var(--green)}
.action-card.amber{background:var(--amber-l);border-color:#FDE68A}
.action-card.amber:hover{background:var(--amber-xl);border-color:var(--amber)}
.action-card.purple{background:var(--purple-l);border-color:#C4B5FD}
.action-card.purple:hover{background:var(--purple-xl);border-color:var(--purple)}
.action-card.pink{background:var(--pink-l);border-color:#F9A8D4}
.action-card.pink:hover{background:var(--pink-xl);border-color:var(--pink)}

/* 현재 학습 모드 표시 바 */
.mode-bar{background:linear-gradient(135deg,#06B6D4 0%,#6366F1 100%);color:white;border-radius:14px;padding:11px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 14px rgba(99,102,241,.3);flex-wrap:wrap}
.mode-bar .mode-label{font-family:'Jua',sans-serif;font-size:14px;font-weight:400;flex:1;min-width:0}
.mode-bar .mode-cnt{background:rgba(255,255,255,.22);padding:4px 10px;border-radius:8px;font-size:11.5px;font-weight:800}
.mode-bar .mode-clear{background:rgba(255,255,255,.95);color:#4F46E5;border:none;padding:6px 12px;border-radius:9px;font-family:'Jua',sans-serif;font-weight:400;font-size:11.5px;cursor:pointer}

/* 📚📅 필터 모달 (Set/Week 선택) */
.filter-modal-ov{position:fixed;inset:0;z-index:90;background:rgba(15,23,42,.65);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.filter-modal-ov.on{display:flex}
.filter-modal{max-width:520px;width:100%;background:white;border-radius:20px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.4);margin:auto}
.filter-hd{background:linear-gradient(135deg,#06B6D4 0%,#6366F1 100%);padding:15px 18px;color:white;display:flex;align-items:center;gap:10px}
.filter-hd .ic{font-size:22px}
.filter-hd .ttl{flex:1;font-family:'Jua',sans-serif;font-weight:400;font-size:16px}
.filter-hd .x{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.35);color:white;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.filter-bd{padding:22px 20px;background:white}
.filter-q{text-align:center;font-family:'Jua',sans-serif;font-size:15px;color:#1F2937;font-weight:400;margin-bottom:18px}
.filter-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.filter-btn{padding:14px 12px;background:linear-gradient(135deg,#ECFEFF,#CFFAFE);border:2px solid #67E8F9;border-radius:13px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .15s}
.filter-btn:hover{border-color:#0891B2;transform:translateY(-2px)}
.filter-btn .nm{font-family:'Jua',sans-serif;font-size:15px;color:#0E7490;font-weight:400}
.filter-btn .cnt{font-size:11px;color:#0891B2;font-weight:800;background:white;padding:2px 8px;border-radius:7px}
.filter-btn.week{background:linear-gradient(135deg,#EEF2FF,#E0E7FF);border-color:#A5B4FC}
.filter-btn.week:hover{border-color:#4F46E5}
.filter-btn.week .nm{color:#4338CA}
.filter-btn.week .cnt{color:#4F46E5}
.filter-btn.week.review{grid-column:1/-1;background:linear-gradient(135deg,#FEF3C7,#FDE68A);border-color:#FCD34D}
.filter-btn.week.review .nm{color:#92400E;font-size:14.5px}
.filter-btn.week.review .cnt{color:#B45309}

/* 🆕 단어장 선택 (Set/Weekly/Basic) 카드 */
.book-grid{display:flex;flex-direction:column;gap:10px}
.book-btn{display:grid;grid-template-columns:56px 1fr auto;gap:12px;align-items:center;padding:16px 18px;border-radius:14px;border:2px solid;cursor:pointer;background:white;text-align:left;transition:all .15s;font-family:'Noto Sans KR',sans-serif}
.book-btn:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,.12)}
.book-btn .bk-ic{font-size:34px;text-align:center;line-height:1}
.book-btn .bk-info{display:flex;flex-direction:column;gap:3px;min-width:0}
.book-btn .bk-nm{font-family:'Jua',sans-serif;font-size:18px;font-weight:400}
.book-btn .bk-desc{font-size:12px;color:var(--muted);font-weight:600;line-height:1.4}
.book-btn .bk-cnt{font-size:13px;font-weight:800;padding:8px 14px;border-radius:10px;background:white;color:#475569;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.08);border:1.5px solid rgba(0,0,0,.06);flex-shrink:0}
.book-btn.bk-set{background:linear-gradient(135deg,#ECFEFF,#CFFAFE);border-color:#67E8F9}
.book-btn.bk-set:hover{border-color:#0891B2}
.book-btn.bk-set .bk-nm{color:#0E7490}
.book-btn.bk-set .bk-cnt{color:#0891B2;border-color:rgba(6,182,212,.25)}
.book-btn.bk-weekly{background:linear-gradient(135deg,#EEF2FF,#E0E7FF);border-color:#A5B4FC}
.book-btn.bk-weekly:hover{border-color:#4F46E5}
.book-btn.bk-weekly .bk-nm{color:#4338CA}
.book-btn.bk-weekly .bk-cnt{color:#4F46E5;border-color:rgba(99,102,241,.25)}
.book-btn.bk-basic{background:linear-gradient(135deg,#FEF3C7,#FDE68A);border-color:#FCD34D}
.book-btn.bk-basic:hover{border-color:#F59E0B}
.book-btn.bk-basic .bk-nm{color:#92400E}
.book-btn.bk-basic .bk-cnt{color:#B45309;border-color:rgba(245,158,11,.3)}

/* 🆕 학습 프로세스 안내 */
.process-grid{display:flex;flex-direction:column;gap:0;margin-top:6px}
.process-card{display:grid;grid-template-columns:44px 1fr auto;align-items:center;gap:12px;padding:13px 15px;border-radius:14px;border:2px solid #E5E7EB;background:#F9FAFB;transition:all .15s;position:relative}
.process-card .pc-num{width:32px;height:32px;border-radius:50%;background:#D1D5DB;color:white;font-family:'Nunito',sans-serif;font-weight:900;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.process-card .pc-body{display:flex;align-items:center;gap:9px;min-width:0}
.process-card .pc-ic{font-size:22px}
.process-card .pc-nm{font-family:'Jua',sans-serif;font-size:15px;font-weight:400;color:#9CA3AF}
.process-card .pc-hint{font-size:10.5px;color:#9CA3AF;font-weight:700;background:white;padding:3px 9px;border-radius:7px;border:1px dashed #D1D5DB}
.process-card.info{opacity:.7}
.process-card.active{cursor:pointer;background:linear-gradient(135deg,#ECFEFF 0%,#E0E7FF 100%);border-color:#06B6D4;box-shadow:0 4px 14px rgba(6,182,212,.15)}
.process-card.active:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(6,182,212,.25)}
.process-card.active .pc-num{background:linear-gradient(135deg,#06B6D4,#6366F1);box-shadow:0 3px 10px rgba(99,102,241,.4)}
.process-card.active .pc-nm{color:#0E7490;font-size:16px}
.process-card.active .pc-tag{background:linear-gradient(135deg,#F59E0B,#EC4899);color:white;font-family:'Jua',sans-serif;font-size:11px;font-weight:400;padding:4px 10px;border-radius:8px;box-shadow:0 2px 8px rgba(245,158,11,.4);animation:tagpulse 1.6s ease-in-out infinite}
.process-card.active .pc-tag.go{background:#3B82F6;box-shadow:0 2px 6px rgba(59,130,246,.3);animation:none}
.process-card.active.wrong{background:linear-gradient(135deg,#FEF2F2 0%,#FCE7F3 100%);border-color:#F87171}
.process-card.active.wrong .pc-num{background:linear-gradient(135deg,#EF4444,#EC4899);box-shadow:0 3px 10px rgba(239,68,68,.4)}
.process-card.active.wrong .pc-nm{color:#B91C1C}
@keyframes tagpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.process-arrow{text-align:center;color:#9CA3AF;font-size:14px;line-height:1;padding:2px 0;font-weight:900;opacity:.6}
.process-grid.compact{flex-direction:row;gap:10px}
.process-grid.compact .process-card{flex:1}

/* 🆕 선택 학습 단어 배지 - 강조 시각화 */
.sel-badge{
  display:inline-flex;align-items:center;
  background:linear-gradient(135deg,#F59E0B 0%,#EC4899 100%);
  color:white;font-family:'Jua',sans-serif;font-weight:400;font-size:13px;
  padding:4px 11px;border-radius:10px;margin-left:8px;
  box-shadow:0 3px 12px rgba(245,158,11,.5),0 0 0 2px rgba(253,224,71,.25);
  vertical-align:middle;
  animation:selpulse 1.8s ease-in-out infinite;
  text-shadow:0 1px 3px rgba(0,0,0,.2)
}
@keyframes selpulse{
  0%,100%{box-shadow:0 3px 12px rgba(245,158,11,.5),0 0 0 2px rgba(253,224,71,.25);transform:scale(1)}
  50%{box-shadow:0 5px 18px rgba(236,72,153,.65),0 0 0 4px rgba(253,224,71,.35);transform:scale(1.03)}
}

.sec{font-size:13px;font-weight:800;color:var(--text);margin:6px 0 -2px;font-family:'Jua',sans-serif;display:flex;align-items:center;gap:6px}
.sec::before{content:'✨';font-size:14px}
.sec-lbl{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:none;letter-spacing:.3px}

/* ══ WORD CARD ══ */
.word-card{background:white;border:3px solid var(--blue-xl);border-radius:22px;padding:24px 22px;text-align:center;box-shadow:var(--shadow);position:relative;overflow:hidden}
.word-card::before{content:'⭐';position:absolute;left:-8px;top:-8px;font-size:40px;opacity:.1;transform:rotate(-20deg)}
.word-card::after{content:'🌟';position:absolute;right:-8px;bottom:-8px;font-size:40px;opacity:.1;transform:rotate(20deg)}
.wc-num{font-size:11px;font-weight:800;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.wc-eng{font-family:'Nunito',sans-serif;font-weight:900;font-size:36px;color:var(--blue-d);margin-bottom:4px;letter-spacing:-.5px}
.wc-pron{font-family:'Nunito',sans-serif;font-size:14px;color:var(--muted);margin-bottom:14px}
.wc-kor{font-size:20px;font-weight:900;color:var(--text);margin-bottom:14px;font-family:'Jua',sans-serif}
.wc-ex{background:var(--blue-l);border-radius:12px;padding:11px 15px;font-size:13px;color:#1E40AF;line-height:1.6;text-align:left}
.wc-ex em{font-style:normal;font-weight:700}
.wc-ex .exkor{display:block;color:var(--muted);font-size:12px;margin-top:4px}

/* ══ STUDY BAR ══ */
.study-bar{background:var(--green-l);border:2px solid #6EE7B7;border-radius:14px;padding:11px 15px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.sbar-lbl{font-size:12px;font-weight:800;color:var(--green);white-space:nowrap;font-family:'Jua',sans-serif}
.sbar-track{flex:1;height:10px;background:#A7F3D0;border-radius:10px;overflow:hidden;position:relative}
.sbar-fill{height:100%;background:linear-gradient(90deg,#10B981,#34D399);border-radius:10px;transition:width .6s cubic-bezier(.34,1.56,.64,1);box-shadow:0 0 8px rgba(16,185,129,.4)}
.sbar-cnt{font-size:12px;font-weight:800;color:var(--green);white-space:nowrap;min-width:38px;text-align:right;font-family:'Nunito',sans-serif}
.study-actions{display:flex;gap:9px}
.sa-btn{flex:1;border:none;border-radius:14px;padding:13px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Jua',sans-serif;transition:all .15s;-webkit-appearance:none}
.sa-stop{background:#FEE2E2;color:var(--red)}
.sa-stop:hover{background:#FECACA}
.sa-next{background:var(--green-l);color:var(--green);border:2px solid #6EE7B7}
.sa-next:hover{background:var(--green-xl)}

/* ══ QUIZ ══ */
.quiz-wrap{display:flex;flex-direction:column;gap:11px}
.quiz-progress{display:flex;align-items:center;gap:9px}
.qp-track{flex:1;height:9px;background:var(--purple-xl);border-radius:10px;overflow:hidden}
.qp-fill{height:100%;background:linear-gradient(90deg,#8B5CF6,#A78BFA);border-radius:10px;transition:width .5s;box-shadow:0 0 8px rgba(139,92,246,.4)}
.qp-cnt{font-size:12px;font-weight:800;color:var(--purple);font-family:'Nunito',sans-serif}
.quiz-question{background:var(--amber-l);border:2px solid #FDE68A;border-radius:18px;padding:18px 20px}
.qq-badge{font-size:10.5px;font-weight:800;color:#92400E;text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
.qq-text{font-size:15px;font-weight:800;color:#78350F;line-height:1.5}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.qopt{background:white;border:2px solid var(--border);border-radius:13px;padding:13px 16px;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--text);text-align:left;font-family:'Noto Sans KR',sans-serif;-webkit-appearance:none}
.qopt:hover:not(:disabled){background:var(--blue-l);border-color:var(--blue);color:var(--blue-d)}
.qopt.ok{background:var(--green-l);border-color:var(--green);color:#065F46;animation:wiggle .4s}
.qopt.ng{background:var(--red-l);border-color:var(--red);color:#991B1B}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-1deg)}75%{transform:rotate(1deg)}}
.quiz-result{border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:11px}
.qr-ok{background:var(--green-l);border:2px solid #6EE7B7}
.qr-ng{background:var(--red-l);border:2px solid #FECACA}
.qr-icon{font-size:28px;flex-shrink:0}
.qr-text{font-size:13.5px;font-weight:700;line-height:1.4}
.write-prompt{background:var(--purple-l);border:2px solid #C4B5FD;border-radius:18px;padding:18px 20px}
.wp-badge{font-size:10.5px;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
.wp-word{font-family:'Nunito',sans-serif;font-weight:900;font-size:30px;color:#3B0764;margin-bottom:4px;letter-spacing:-.5px}
.wp-hint{font-size:12.5px;color:var(--purple);margin-top:7px;font-weight:600}
.write-inp-row{display:flex;gap:9px}
.write-inp{flex:1;border:2px solid var(--border);border-radius:13px;padding:13px 16px;font-size:16px;font-family:'Noto Sans KR',sans-serif;outline:none;color:var(--text);transition:border .15s;background:var(--bg)}
.write-inp:focus{border-color:var(--purple);background:white}
.write-sub{background:var(--purple);color:white;border:none;border-radius:13px;padding:13px 20px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Jua',sans-serif;transition:background .15s;flex-shrink:0;-webkit-appearance:none}
.write-sub:hover{background:#6D28D9}
.quiz-end{background:linear-gradient(135deg,#F59E0B 0%,#EC4899 50%,#8B5CF6 100%);border-radius:20px;padding:28px 24px;text-align:center;color:white;position:relative;overflow:hidden}
.quiz-end::before{content:'🎉';position:absolute;left:10px;top:10px;font-size:32px;opacity:.4;animation:bounce 1.5s ease-in-out infinite}
.quiz-end::after{content:'🏆';position:absolute;right:10px;bottom:10px;font-size:32px;opacity:.4;animation:bounce 1.5s ease-in-out infinite .3s}
.qe-icon{font-size:56px;margin-bottom:12px;animation:bounce 1.5s ease-in-out infinite}
.qe-title{font-size:22px;font-weight:900;margin-bottom:5px;font-family:'Jua',sans-serif;text-shadow:0 2px 8px rgba(0,0,0,.2)}
.qe-sub{font-size:13px;color:rgba(255,255,255,.9);margin-bottom:18px}
.qe-btn{background:white;color:var(--blue-d);border:none;border-radius:12px;padding:11px 22px;font-size:13.5px;font-weight:800;cursor:pointer;font-family:'Jua',sans-serif;transition:all .15s;margin:4px 4px;-webkit-appearance:none}
.qe-btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.25)}

/* ══ 발음 버튼 ══ */
.speak-btn{background:none;border:none;cursor:pointer;font-size:20px;padding:3px 5px;transition:transform .15s;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;-webkit-appearance:none}
.speak-btn:hover{transform:scale(1.3)}
.speak-btn:active{transform:scale(0.85)}
.speak-btn.speaking{animation:speakPulse .6s ease-in-out infinite}
@keyframes speakPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
.speak-btn-lg{background:var(--blue-l);border:2px solid #BFDBFE;cursor:pointer;font-size:21px;padding:8px 16px;border-radius:14px;transition:all .15s;display:inline-flex;align-items:center;gap:7px;font-family:'Jua',sans-serif;font-size:14px;font-weight:700;color:var(--blue-d);-webkit-appearance:none}
.speak-btn-lg:hover{background:var(--blue);color:white;border-color:var(--blue)}
.speak-btn-lg.speaking{background:var(--blue);color:white;border-color:var(--blue);animation:speakPulse .6s ease-in-out infinite}

/* ══ 오답노트 ══ */
.wrong-filter{display:flex;gap:7px;flex-wrap:wrap}
.wf-btn{background:white;border:2px solid var(--border);color:var(--muted);font-size:12px;font-weight:700;padding:7px 14px;border-radius:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;-webkit-appearance:none}
.wf-btn.on{background:var(--red);color:white;border-color:var(--red)}
.wrong-card{background:white;border:2px solid #FECACA;border-radius:16px;overflow:hidden;transition:box-shadow .2s;margin-bottom:8px}
.wrong-card:hover{box-shadow:0 6px 18px rgba(239,68,68,.15)}
.wrc-top{display:flex;align-items:center;gap:11px;padding:13px 15px}
.wrc-cnt{background:var(--red);color:white;font-family:'Nunito',sans-serif;font-weight:900;font-size:13px;padding:4px 10px;border-radius:20px;flex-shrink:0;min-width:36px;text-align:center}
.wrc-eng{font-family:'Nunito',sans-serif;font-weight:900;font-size:21px;color:#991B1B;flex:1}
.wrc-kor{font-size:14px;font-weight:700;color:var(--text)}
.wrc-pos{font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px;background:#FEE2E2;color:#991B1B;flex-shrink:0}
.wrc-date{font-size:10.5px;color:var(--muted);flex-shrink:0}
.wrc-bottom{background:#FEF2F2;border-top:1px solid #FECACA;padding:9px 15px;display:flex;gap:7px;align-items:center}
.wrong-empty{text-align:center;padding:42px;color:var(--muted);font-size:13.5px;font-weight:600}
.wrong-empty .ei{font-size:48px;margin-bottom:12px}
.wrong-summary{background:linear-gradient(135deg,#EF4444 0%,#F87171 100%);border-radius:16px;padding:16px 20px;color:white;display:flex;align-items:center;gap:16px;box-shadow:0 4px 16px rgba(239,68,68,.25)}
.ws-num{font-family:'Nunito',sans-serif;font-weight:900;font-size:36px;text-shadow:0 2px 8px rgba(0,0,0,.2)}
.ws-info .t1{font-size:14px;font-weight:800;font-family:'Jua',sans-serif}
.ws-info .t2{font-size:11.5px;color:rgba(255,255,255,.85)}

/* ══ WORD DETAIL (전체단어) ══ */
.wdetail-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.wdetail-header h3{font-size:15px;font-weight:900;color:var(--text);font-family:'Jua',sans-serif}
.wdetail-search{border:2px solid var(--border);border-radius:12px;padding:10px 14px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;width:100%;background:var(--bg);transition:border .15s;margin-bottom:4px}
.wdetail-search:focus{border-color:var(--blue);background:white}
.wdetail-card{background:white;border:2px solid var(--border);border-radius:18px;overflow:hidden;transition:box-shadow .2s;margin-bottom:8px}
.wdetail-card:hover{box-shadow:var(--shadow)}
.wdc-top{display:flex;align-items:flex-start;gap:12px;padding:14px 16px 10px}
.wdc-num{background:var(--blue-d);color:white;font-family:'Nunito',sans-serif;font-weight:900;font-size:11px;padding:3px 9px;border-radius:20px;flex-shrink:0;margin-top:3px}
.wdc-main{flex:1}
.wdc-eng{font-family:'Nunito',sans-serif;font-weight:900;font-size:24px;color:var(--blue-d);line-height:1.2;letter-spacing:-.3px}
.wdc-pron{font-family:'Nunito',sans-serif;font-size:13px;color:var(--muted);margin-top:2px}
.wdc-kor{font-size:16px;font-weight:900;color:var(--text);margin-top:6px;font-family:'Jua',sans-serif}
.wdc-active{background:var(--green-xl);color:var(--green);font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:10px;flex-shrink:0}
.wdc-active.off{background:#F1F5F9;color:var(--muted)}
.wdc-bottom{background:var(--blue-l);border-top:1px solid var(--blue-xl);padding:11px 16px;display:flex;flex-direction:column;gap:4px}
.wdc-ex{font-size:13px;color:#1E40AF;font-style:italic;line-height:1.5}
.wdc-exkor{font-size:12px;color:var(--muted);margin-top:1px}
.wdetail-empty{text-align:center;padding:42px;color:var(--muted);font-size:13.5px;font-weight:600}
.pos-badge{display:inline-block;font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:10px;letter-spacing:.3px;flex-shrink:0}
.pos-n{background:#DBEAFE;color:#1D4ED8}
.pos-v{background:#D1FAE5;color:#065F46}
.pos-adj{background:#FEF3C7;color:#92400E}
.pos-adv{background:#EDE9FE;color:#5B21B6}
.pos-prep{background:#F1F5F9;color:#475569}
.pos-conj{background:#FCE7F3;color:#9D174D}
.pos-etc{background:#F1F5F9;color:#64748B}
.wdetail-stat{font-size:11.5px;color:var(--muted);font-weight:700;margin-bottom:2px}
.wdetail-stat span{color:var(--blue);font-weight:900}

/* ══ WORD LIST ══ */
.wl-toolbar{display:flex;gap:7px;flex-wrap:wrap}
.wl-btn{display:flex;align-items:center;gap:5px;border:2px solid var(--border);border-radius:10px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;background:white;-webkit-appearance:none}
.wl-btn:hover{border-color:var(--blue);color:var(--blue)}
.wl-btn.green{border-color:#6EE7B7;color:var(--green);background:var(--green-l)}
.wl-btn.green:hover{background:var(--green-xl)}
#xlsxInput{display:none}
.add-form{background:var(--blue-l);border:2px dashed #93C5FD;border-radius:14px;padding:11px}
.add-form-row{display:flex;gap:7px;flex-wrap:wrap}
.add-form input{flex:1;min-width:80px;border:2px solid var(--border);border-radius:9px;padding:8px 11px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;background:white}
.add-form input:focus{border-color:var(--blue)}
.add-form-btn{background:var(--blue);color:white;border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Jua',sans-serif;-webkit-appearance:none}
.wl-stat{font-size:12px;font-weight:700;color:var(--muted)}
.wl-stat span{color:var(--blue);font-weight:900}
.word-row{display:flex;align-items:center;gap:8px;background:white;border:2px solid var(--border);border-radius:12px;padding:10px 12px;transition:all .15s;margin-bottom:6px}
.word-row:hover{border-color:#BFDBFE;background:var(--blue-l)}
.word-row.off{opacity:.4}
.wr-chk{width:18px;height:18px;min-width:18px;cursor:pointer;accent-color:var(--blue);flex-shrink:0}
.wr-n{font-size:10.5px;color:var(--muted);min-width:18px;text-align:right;font-weight:700}
.wr-eng{font-family:'Nunito',sans-serif;font-weight:800;font-size:14.5px;color:var(--blue-d);min-width:84px}
.wr-pron{font-family:'Nunito',sans-serif;font-size:11px;color:var(--muted);flex:0 0 auto;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wr-kor{font-size:13px;color:var(--text);flex:1;font-weight:700}
.wr-del{color:#CBD5E1;cursor:pointer;font-size:13px;flex-shrink:0;transition:color .15s;padding:2px 5px}
.wr-del:hover{color:var(--red)}

.sync-pill{font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:11px;display:inline-flex;align-items:center;gap:4px}
.sp-ok{background:#DCFCE7;color:#166534;border:1px solid #86EFAC}
.sp-load{background:#FEF3C7;color:#92400E;border:1px solid #FDE68A}
.sp-err{background:#FEE2E2;color:#991B1B;border:1px solid #FECACA}

/* ══ ADMIN ══ */
.adm-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.adm-card{background:white;border:2px solid var(--border);border-radius:12px;padding:11px 6px;text-align:center}
.adm-card .n{font-family:'Nunito',sans-serif;font-weight:900;font-size:19px;color:var(--blue-d)}
.adm-card .l{font-size:9.5px;color:var(--muted);margin-top:1px;font-weight:700}
.date-row{display:flex;gap:6px;flex-wrap:wrap}
.dtab{background:white;border:2px solid var(--border);color:var(--text);font-size:11.5px;font-weight:800;padding:7px 11px;border-radius:9px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;-webkit-appearance:none}
.dtab.on{background:var(--blue);color:white;border-color:var(--blue)}

/* 🆕 V7: 현재 기간 표시 배지 (관리 대시보드 헤더) */
.admin-period{
  font-family:'Jua',sans-serif;font-size:12.5px;font-weight:700;
  color:var(--blue-d);background:var(--blue-l);
  border:1px solid #BFDBFE;
  padding:4px 11px;border-radius:11px;margin-left:8px;
  display:inline-block;vertical-align:middle
}

/* 🆕 V7: 학생별 요약 표 (집계) */
.summary-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.summary-tbl th{background:#F3E8FF;color:#6B21A8;font-weight:800;padding:9px 5px;text-align:center;border-bottom:2px solid #A78BFA;font-family:'Jua',sans-serif}
.summary-tbl td{padding:9px 5px;text-align:center;border-bottom:1px solid var(--border);color:var(--text);font-family:'Noto Sans KR',sans-serif}
.summary-tbl td.s-name{font-weight:900;text-align:left;color:var(--blue-d);padding-left:9px}
.summary-tbl td.s-big{font-family:'Nunito',sans-serif;font-weight:900;font-size:13.5px;color:var(--blue-d)}
.summary-tbl td.s-mins{font-family:'Nunito',sans-serif;font-weight:900;font-size:13.5px;color:#10B981}
.summary-tbl tr:hover td{background:#FAFAFA}

.log-tbl{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:6px}
.log-tbl th{background:var(--blue-l);color:var(--blue-d);font-weight:800;padding:8px 5px;text-align:center;border-bottom:2px solid var(--blue);font-family:'Jua',sans-serif}
.log-tbl td{padding:7px 5px;text-align:center;border-bottom:1px solid var(--border);color:var(--text)}
.ox-o{color:var(--green);font-weight:900}
.ox-x{color:#CBD5E1;font-weight:700}

/* ══ ETC ══ */
.empty-state{text-align:center;padding:42px;color:var(--muted);font-size:13.5px;font-weight:600}
.empty-state .ei{font-size:48px;margin-bottom:12px}
.loading-state{text-align:center;padding:20px;color:var(--muted);font-size:13px;display:flex;align-items:center;justify-content:center;gap:9px}
.spin{display:inline-block;width:16px;height:16px;border:2.5px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-pulse{display:inline-block;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

/* ════════════════════════════════════════════
   🆕 학생 이름 클릭 가능 표시 (세션별 로그 + 학생 요약 표 둘 다)
   ════════════════════════════════════════════ */
.log-tbl td.clickable-name,
.summary-tbl td.clickable-name{cursor:pointer;color:var(--blue-d);font-weight:900;text-decoration:underline;text-decoration-color:transparent;transition:all .15s}
.log-tbl td.clickable-name:hover,
.summary-tbl td.clickable-name:hover{color:var(--blue);text-decoration-color:var(--blue);background:var(--blue-l)}

/* ════════════════════════════════════════════
   🆕 인쇄 버튼 (관리자 + 학습지 공용)
   ════════════════════════════════════════════ */
.print-btn{
  background:linear-gradient(135deg,#10B981 0%,#059669 100%);color:white;border:none;border-radius:11px;
  padding:9px 16px;font-size:12.5px;font-weight:800;cursor:pointer;font-family:'Jua',sans-serif;
  display:inline-flex;align-items:center;gap:6px;
  box-shadow:0 4px 16px rgba(16,185,129,.35);transition:all .2s;-webkit-appearance:none
}
.print-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(16,185,129,.45)}
.print-btn:active{transform:translateY(0)}

.worksheet-btn{
  background:linear-gradient(135deg,#F59E0B 0%,#EC4899 100%);color:white;border:none;border-radius:11px;
  padding:9px 16px;font-size:12.5px;font-weight:800;cursor:pointer;font-family:'Jua',sans-serif;
  display:inline-flex;align-items:center;gap:6px;
  box-shadow:0 4px 16px rgba(236,72,153,.35);transition:all .2s;-webkit-appearance:none
}
.worksheet-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(236,72,153,.45)}
.worksheet-btn:active{transform:translateY(0)}

/* ════════════════════════════════════════════
   🆕 학생 리포트 오버레이
   ════════════════════════════════════════════ */
.report-ov, .ws-ov{
  position:fixed;inset:0;z-index:300;background:rgba(15,23,42,.7);backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto
}
.report-card{
  background:white;border-radius:22px;max-width:680px;width:100%;max-height:92vh;max-height:92dvh;
  overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.4);position:relative
}
.report-header{
  background:linear-gradient(135deg,#3B82F6 0%,#8B5CF6 100%);color:white;padding:20px 24px;
  position:sticky;top:0;z-index:5;border-radius:22px 22px 0 0
}

<script>
// ════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════
const GS_URL = '/api'; // 🔁 프록시 경유 (netlify functions). 원래 주소는 netlify/functions/proxy.js 안에 있음
let PW = '246'; // 🆕 시트의 [앱정보]→password 값으로 자동 갱신됨 (기본값: 246)

// 🆕 V7: 시트의 앱정보에서 비밀번호 등 설정 로드
async function loadAppInfo() {
  if (!GS_URL) return;
  const res = await sheetFetch({ action: 'getAppInfo' });
  if (res && res.success && res.info) {
    if (res.info.password) {
      PW = String(res.info.password).trim();
      console.log('🔐 비밀번호 갱신: 시트 [앱정보] 사용');
    }
  }
}
const GRADE = '초등1_1'; // 학년 식별자 (로컬 캐시 키에 사용)
const SYNC_KEY = 'gnb_wc_synced_' + GRADE; // 마지막 동기화 시점의 스냅샷 (변경 감지용)

// ════════════════════════════════════════════
// 🍎 iOS 발음 잠금 해제 (Speech Unlock)
// ════════════════════════════════════════════
let _speechUnlocked = false;
function unlockSpeech() {
  if (_speechUnlocked) return;
  if (!('speechSynthesis' in window)) return;
  try {
    // 무음 utterance를 한 번 실행 → iOS는 이후 자동 재생 허용
    const u = new SpeechSynthesisUtterance(' ');
    u.volume = 0;
    u.rate = 1;
    speechSynthesis.speak(u);
    _speechUnlocked = true;
    console.log('🔓 Speech unlocked for iOS');
  } catch(e) {
    console.warn('Speech unlock failed:', e);
  }
}

// ════════════════════════════════════════════
// SHEETS 통신
// ════════════════════════════════════════════
const _imgs = [];
function sheetSend(params) {
  if (!GS_URL) return;
  const img = new Image();
  _imgs.push(img);
  img.onload = img.onerror = () => { const i=_imgs.indexOf(img); if(i>-1)_imgs.splice(i,1); };
  img.src = GS_URL + '?' + new URLSearchParams(params).toString();
}

// 단어 전체를 Sheets에 덮어쓰기 (sendBeacon POST)
function sheetReplaceAll(words) {
  if (!GS_URL) return;
  try {
    const payload = JSON.stringify({
      action: 'replaceAllWords',
      words: words.map(w => ({
        eng: w.eng||'', pron: w.pron||'', kor: w.kor||'',
        pos: w.pos||'', ex: w.ex||'', exKor: w.exKor||'', active: w.active!==false
      }))
    });
    navigator.sendBeacon(GS_URL, new Blob([payload], {type:'text/plain'}));
    console.log('✅ 단어 전체 Sheets 전송:', words.length+'개');
  } catch(e) {

// 🍎 JSONP 1회 시도 (내부 함수)
function _sheetFetchOnce(params, timeoutMs) {
  if (!GS_URL) return Promise.resolve(null);
  return new Promise(resolve => {
    const cb = '_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2,5);
    const t = setTimeout(() => { cleanup(); resolve(null); }, timeoutMs);
    function cleanup(){ clearTimeout(t); delete window[cb]; document.getElementById(cb)?.remove(); }
    window[cb] = d => { cleanup(); resolve(d); };
    const s = document.createElement('script');
    s.id = cb;
    s.src = GS_URL + '?' + new URLSearchParams({...params, callback:cb}).toString();
    s.onerror = () => { cleanup(); resolve(null); };
    document.head.appendChild(s);
  });
}

// 🍎 JSONP 재시도 로직 (iOS 대응)
async function sheetFetch(params, retries = 2) {
  const timeouts = [8000, 10000, 14000]; // 점진적 증가
  for (let attempt = 0; attempt <= retries; attempt++) {
    const result = await _sheetFetchOnce(params, timeouts[attempt] || 14000);
    if (result !== null) {
      if (attempt > 0) console.log(`✅ Sheets 응답 성공 (${attempt+1}번째 시도)`);
      return result;
    }
    if (attempt < retries) {
      console.warn(`⚠️ Sheets 응답 없음, ${attempt+1}번째 재시도...`);
      await new Promise(r => setTimeout(r, 800 * (attempt + 1)));
    }
  }
  console.error('❌ Sheets 연결 최종 실패');
  return null;
}

// ════════════════════════════════════════════
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) {
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  // iOS는 suspended 상태로 시작 가능 → 사용자 터치 컨텍스트에서 resume
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}

// 정답 사운드: "딩동댕" (도-미-솔 상승 화음)
function playCorrect() {
  const ctx = getAudioCtx(); if (!ctx) return;
  const notes = [
    { freq: 523.25, time: 0,    dur: 0.18 }, // C5
    { freq: 659.25, time: 0.14, dur: 0.18 }, // E5
    { freq: 783.99, time: 0.28, dur: 0.32 }  // G5
  ];
  notes.forEach(n => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.value = n.freq;
    const t0 = ctx.currentTime + n.time;
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.25, t0 + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + n.dur);
    osc.start(t0);
    osc.stop(t0 + n.dur + 0.05);
  });
}

// 오답 사운드: "땡" (낮은 부저음)
function playWrong() {
  const ctx = getAudioCtx(); if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(220, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(180, ctx.currentTime + 0.25);
  gain.gain.setValueAtTime(0.0001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.4);
  osc.start();
  osc.stop(ctx.currentTime + 0.45);
}

function AW(){
  // 1) 기본: 활성 단어만
  let pool = WDB.filter(w => w.active !== false);
  // 2) ★ Basic / Set / Weekly 단어장 분기
  if (!activeMode || activeMode.type === 'basic'){
    // Basic: Set과 Week 모두 비어있는 일반 단어
    pool = pool.filter(w => !String(w.set||'').trim() && !String(w.week||'').trim());
    return pool;
  }
  if (activeMode.type === 'set'){
    const target = String(activeMode.value).trim();
    pool = pool.filter(w => String(w.set||'').trim() === target);
  } else if (activeMode.type === 'week'){
    const target = parseInt(activeMode.value);
    if (target === 5){
      pool = pool.filter(w => {
        if (String(w.set||'').trim()) return false;
        return _parseWeek(w.week).some(n => n>=1 && n<=4);
      });
    } else {
      pool = pool.filter(w => {
        if (String(w.set||'').trim()) return false;
        return _parseWeek(w.week).includes(target);
      });
    }
  }
  return pool;
}

// ════════════════════════════════════════════
// ★★★ Set / Week 필터 시스템 ★★★
// ════════════════════════════════════════════
let WDB_FULL = [];
let activeMode = null;

function _parseWeek(w){
  const s = String(w||'').trim();
  if (!s) return [];
  const m = s.match(/^(\d+)\s*[-~]\s*(\d+)$/);
  if (m){
    const a = parseInt(m[1]), b = parseInt(m[2]);
    const lo = Math.min(a,b), hi = Math.max(a,b);
    const arr = [];
    for (let i=lo; i<=hi; i++) arr.push(i);
    return arr;
  }
  const single = parseInt(s);
  return isNaN(single) ? [] : [single];
}

function _applyFilter(){
  if (!activeMode || activeMode.type === 'all'){ WDB = WDB_FULL.slice(); return; }
  if (activeMode.type === 'set'){
    const target = String(activeMode.value).trim();
    WDB = WDB_FULL.filter(w => String(w.set||'').trim() === target);
    return;
  }
  if (activeMode.type === 'week'){
    const target = parseInt(activeMode.value);
    if (target === 5){
      WDB = WDB_FULL.filter(w => {
        if (String(w.set||'').trim()) return false;
        return _parseWeek(w.week).some(n => n>=1 && n<=4);
      });
    } else {
      WDB = WDB_FULL.filter(w => {
        if (String(w.set||'').trim()) return false;
        return _parseWeek(w.week).includes(target);
      });
    }
    return;
  }
  WDB = WDB_FULL.slice();
}

function syncWDBFull(){
  WDB_FULL = WDB.slice();

}

// 🆕 단어 변경사항 감지 (diff)
// ════════════════════════════════════════════
function diffWords(current, snapshot) {
  const norm = s => String(s||'').toLowerCase().trim();
  const snapMap = {};
  snapshot.forEach(w => { if(w&&w.eng) snapMap[norm(w.eng)] = w; });
  const curMap = {};
  current.forEach(w => { if(w&&w.eng) curMap[norm(w.eng)] = w; });

  const toAdd = [];        // 새로 추가된 단어
  const toUpdate = [];     // 내용(뜻/발음/예문/품사)이 바뀐 단어
  const toDelete = [];     // 삭제된 단어
  const toggleOnly = [];   // 활성 상태만 바뀐 단어

  current.forEach(w => {
    const key = norm(w.eng);
    const snap = snapMap[key];
    if (!snap) { toAdd.push(w); return; }
    const contentChanged =
      String(w.pron||'')  !== String(snap.pron||'')  ||
      String(w.kor||'')   !== String(snap.kor||'')   ||
      String(w.pos||'')   !== String(snap.pos||'')   ||
      String(w.ex||'')    !== String(snap.ex||'')    ||
      String(w.exKor||'') !== String(snap.exKor||'');
    const activeChanged = (w.active !== false) !== (snap.active !== false);
    if (contentChanged) toUpdate.push(w);
    else if (activeChanged) toggleOnly.push({ eng: w.eng, active: w.active !== false });
  });
  snapshot.forEach(w => {
    if (w && w.eng && !curMap[norm(w.eng)]) toDelete.push(w.eng);
  });
  return { toAdd, toUpdate, toDelete, toggleOnly };
}

// 🆕 변경사항만 Google Sheets에 업로드
async function pushToSheet(){
  if(!GS_URL){ showStatus('❌ Google Sheets URL이 설정되지 않았습니다.','err'); return; }
  if(!WDB.length){ showStatus('❌ 업로드할 단어가 없어요.','err'); return; }

  // 마지막 동기화 시점의 스냅샷 불러오기
  let snapshot = [];
  try { snapshot = JSON.parse(localStorage.getItem(SYNC_KEY) || '[]'); } catch(e){}

  // 최초 동기화인 경우: 전체 업로드
  if (!snapshot.length) {
    if(!confirm(`첫 동기화입니다.\n${WDB.length}개 단어를 Google Sheets에 전체 업로드할까요?\n\n⚠️ Sheets의 기존 단어는 모두 교체됩니다.`)) return;
    showStatus(`⬆ 전체 업로드 중... (0/${WDB.length})`, 'warn');
    setSyncPill('load', '전체 업로드 중...');
    sheetSend({ action: 'clearWords' });
    await new Promise(r => setTimeout(r, 1200));
    for (let i = 0; i < WDB.length; i++) {
      const w = WDB[i];
      sheetSend({
        action: 'addWord',
        eng: w.eng||'', pron: w.pron||'', kor: w.kor||'',
        pos: w.pos||'', ex: w.ex||'', exKor: w.exKor||''
      });
      if (w.active === false) {
        await new Promise(r => setTimeout(r, 150));
        sheetSend({ action: 'toggleWord', eng: w.eng, active: false });
      }
      if ((i+1) % 5 === 0) showStatus(`⬆ 전체 업로드 중... (${i+1}/${WDB.length})`, 'warn');
      await new Promise(r => setTimeout(r, 250));
    }
    try { localStorage.setItem(SYNC_KEY, JSON.stringify(WDB)); } catch(e){}
    showStatus(`✅ ${WDB.length}개 단어 전체 업로드 완료!`, 'ok');
    setSyncPill('ok', '✅ 동기화 완료');
    return;
  }

  // 변경사항 계산
  const diff = diffWords(WDB, snapshot);
  const total = diff.toAdd.length + diff.toUpdate.length + diff.toDelete.length + diff.toggleOnly.length;

  if (total === 0) {
    showStatus('✅ 변경된 단어가 없어요. 이미 모두 동기화되어 있습니다!', 'ok');
    setSyncPill('ok', '✅ 동기화 완료');
    return;
  }

  // 변경사항 미리보기
  const summary = [];
  if (diff.toAdd.length)      summary.push(`➕ 추가 ${diff.toAdd.length}개`);
  if (diff.toUpdate.length)   summary.push(`✏️ 수정 ${diff.toUpdate.length}개`);
  if (diff.toDelete.length)   summary.push(`🗑️ 삭제 ${diff.toDelete.length}개`);
  if (diff.toggleOnly.length) summary.push(`🔄 활성토글 ${diff.toggleOnly.length}개`);
  if(!confirm(`변경 사항을 Google Sheets에 반영합니다:\n\n${summary.join('\n')}\n\n진행할까요?`)) return;

  showStatus(`⬆ 업로드 중... (0/${total})`, 'warn');
  setSyncPill('load', '업로드 중...');
  let progress = 0;
  const tick = (txt) => { progress++; showStatus(`⬆ ${txt} (${progress}/${total})`, 'warn'); };

  // 1) 삭제
  for (const eng of diff.toDelete) {
    sheetSend({ action: 'deleteWord', eng });
    tick(`🗑️ 삭제 중`);
    await new Promise(r => setTimeout(r, 220));
  }
  // 2) 수정 (삭제 + 추가)
  for (const w of diff.toUpdate) {
    sheetSend({ action: 'deleteWord', eng: w.eng });
    await new Promise(r => setTimeout(r, 200));
    sheetSend({
      action: 'addWord',
      eng: w.eng||'', pron: w.pron||'', kor: w.kor||'',
      pos: w.pos||'', ex: w.ex||'', exKor: w.exKor||''
    });
    if (w.active === false) {
      await new Promise(r => setTimeout(r, 150));
      sheetSend({ action: 'toggleWord', eng: w.eng, active: false });
    }
    tick(`✏️ 수정 중`);
    await new Promise(r => setTimeout(r, 250));
  }
  // 3) 추가
  for (const w of diff.toAdd) {
    sheetSend({
      action: 'addWord',
      eng: w.eng||'', pron: w.pron||'', kor: w.kor||'',
      pos: w.pos||'', ex: w.ex||'', exKor: w.exKor||''
    });
    if (w.active === false) {
      await new Promise(r => setTimeout(r, 150));
      sheetSend({ action: 'toggleWord', eng: w.eng, active: false });
    }
    tick(`➕ 추가 중`);
    await new Promise(r => setTimeout(r, 250));
  }
  // 4) 활성 토글만
  for (const { eng, active } of diff.toggleOnly) {
    sheetSend({ action: 'toggleWord', eng, active });
    tick(`🔄 활성토글 중`);
    await new Promise(r => setTimeout(r, 200));
  }

  // 스냅샷 갱신 — 다음 push 때 이 시점이 기준
  try { localStorage.setItem(SYNC_KEY, JSON.stringify(WDB)); } catch(e){}

  showStatus(`✅ ${total}개 변경사항을 동기화했습니다! (${summary.join(', ')})`, 'ok');
  setSyncPill('ok', '✅ 동기화 완료');
}

function filterWords(q){
  const aw=AW();
  if(!q.trim()){ renderWordCards(aw); return; }
  const kw=q.trim().toLowerCase();
  const filtered=aw.filter(w=>
    w.eng.toLowerCase().includes(kw) ||
    w.kor.includes(kw) ||
    (w.pron||'').includes(kw) ||
    (w.ex||'').toLowerCase().includes(kw) ||
    (w.exKor||'').includes(kw)
  );
  renderWordCards(filtered);
}

let studyT=null, studyI=0, studyList=[], nextBtnT=null; // 🆕 nextBtnT = 카운트다운 타이머

function renderStudy(){
  const m=document.getElementById('main');
  const aw=AW();
  if(!aw.length){ m.innerHTML='<div class="empty-state"><div class="ei">📭</div>활성 단어가 없어요!<br>단어장에서 단어를 체크해주세요.</div>'; return; }
  m.innerHTML=`
    <div class="study-bar" id="sbar">
      <span class="sbar-lbl" id="sbarLbl">준비 중...</span>
      <div class="sbar-track"><div class="sbar-fill" id="sbarFill" style="width:0%"></div></div>
      <span class="sbar-cnt" id="sbarCnt">0/${aw.length}</span>
    </div>
    <div id="studyCard"></div>
    <div class="study-actions">
      <button class="sa-btn sa-stop" onclick="endStudySession()">⏹ 종료</button>
      <button class="sa-btn sa-next" id="nextBtn" onclick="studyNext()" style="transition:opacity .3s">다음 →</button>
    </div>`;
  studyList=aw; studyI=0;
  showStudyCard();
  studyT=setInterval(()=>{ studyI++; if(studyI>=studyList.length){ stopStudy(); done('wordStudy'); setTimeout(()=>showStudyDoneCard(),300); } else showStudyCard(); }, 12000);
}
function showStudyCard(){
  const w=studyList[studyI];
  const pct=Math.round((studyI+1)/studyList.length*100);
  document.getElementById('sbarFill').style.width=pct+'%';
  document.getElementById('sbarCnt').textContent=`${studyI+1}/${studyList.length}`;
  document.getElementById('sbarLbl').textContent=`${studyI+1}번째 단어 ✨`;

  // 🆕 "다음 →" 버튼 7초 카운트다운 (그동안은 비활성)
  clearInterval(nextBtnT);
  let remaining = 7;
  const initBtn = document.getElementById('nextBtn');
  if(initBtn){
    initBtn.style.opacity = '0.35';
    initBtn.style.pointerEvents = 'none';
    initBtn.textContent = `⏳ ${remaining}초 후 다음`;
  }
  nextBtnT = setInterval(()=>{
    remaining--;
    const nb = document.getElementById('nextBtn');
    if(!nb){ clearInterval(nextBtnT); return; }
    if(remaining <= 0){
      clearInterval(nextBtnT);
      nb.style.opacity = '1';
      nb.style.pointerEvents = 'auto';
      nb.textContent = '다음 →';
    } else {
      nb.textContent = `⏳ ${remaining}초 후 다음`;
    }
  }, 1000);

  const c=document.getElementById('studyCard');
  if(c){
    c.style.opacity='0'; c.style.transform='translateY(8px)';
    c.innerHTML=wordCardHTML(w,`단어 ${studyI+1} / ${studyList.length}`, true);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      c.style.transition='all .4s'; c.style.opacity='1'; c.style.transform='translateY(0)';
    }));
    // 🍎 카드 전환 후 자동 발음 (unlock 된 경우만)
    setTimeout(()=>speakAuto(w.eng), 500);
  }
}
function studyNext(){
  clearInterval(studyT); clearInterval(nextBtnT); studyI++;
  if(studyI>=studyList.length){ stopStudy(); done('wordStudy'); showStudyDoneCard(); return; }
  showStudyCard();
  studyT=setInterval(()=>{ studyI++; if(studyI>=studyList.length){ stopStudy(); done('wordStudy'); setTimeout(()=>showStudyDoneCard(),300); } else showStudyCard(); },12000);
}
function stopStudy(){
  if(studyT){ clearInterval(studyT); studyT=null; }
  if(nextBtnT){ clearInterval(nextBtnT); nextBtnT=null; } // 🆕 카운트다운도 정리
}
function showStudyDoneCard(){
  // 🆕 오답 학습 모드면 wrong 탭으로 복귀 버튼
  const wasWrong = window._wrongMode;
  const buttons = wasWrong
    ? `<button class="qe-btn" onclick="endStudySession()">❌ 오답노트로 돌아가기</button>`
    : `<button class="qe-btn" onclick="goTab('mcq')">🧩 객관식 도전</button>
       <button class="qe-btn" onclick="goTab('home')">🏠 홈으로</button>`;
  document.getElementById('main').innerHTML=`<div class="quiz-end">
    <div class="qe-icon">🎉</div>
    <div class="qe-title">${wasWrong ? '오답 복습 완료!' : '멋져요!'}</div>
    <div class="qe-sub">단어 <strong>${studyList.length}개</strong>를 모두 공부했어요! 👏</div>
    ${buttons}
  </div>`;
}

// 🆕 단어공부 종료 — wrongMode면 wrong 탭으로, 아니면 홈으로
function endStudySession() {
  stopStudy();
  if (window._wrongMode) {
    window._wrongMode = false;
    goTab('wrong');
  } else {
    goTab('home');
  }
}

// MCQ QUIZ
// ════════════════════════════════════════════
let QS={active:false,queue:[],done:0,total:0,cur:null,sub:null};
function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

function renderMCQ(){
  const aw=AW();
  if(aw.length<2){ document.getElementById('main').innerHTML='<div class="empty-state"><div class="ei">🧩</div>퀴즈를 위해 활성 단어가 2개 이상 필요해요!</div>'; return; }
  QS={active:true,queue:shuffle(aw),done:0,total:aw.length,cur:null,sub:null};
  showMCQCard();
}

function showMCQCard(){
  if(!QS.active||!QS.queue.length)return;
  QS.cur=QS.queue[0];
  const w=QS.cur, aw=AW();
  let others=aw.filter(o=>o.eng!==w.eng);

  // 🆕 오답 학습 모드에서 보기가 부족하면 원본 활성 단어장에서 채우기
  if (others.length < 3 && window._wrongStudyRestore) {
    const original = window._wrongStudyRestore.filter(o => o.active !== false && o.eng !== w.eng);
    const seen = new Set(others.map(o => o.eng.toLowerCase()));
    original.forEach(o => {
      if (!seen.has(o.eng.toLowerCase())) {
        others.push(o);
        seen.add(o.eng.toLowerCase());
      }
    });
  }

  QS.sub=Math.random()<0.5?'kor':'eng';
  const id='q'+Date.now();
  let q, correct, opts;
  if(QS.sub==='kor'){ q=`<strong>${esc(w.eng)}</strong>의 뜻은?`; correct=w.kor; opts=shuffle([w.kor,...shuffle(others).slice(0,3).map(o=>o.kor)]); }
  else{ q=`<strong>${esc(w.kor)}</strong>의 영어 단어는?`; correct=w.eng; opts=shuffle([w.eng,...shuffle(others).slice(0,3).map(o=>o.eng)]); }
  const pct=QS.total>0?Math.round(QS.done/QS.total*100):0;
  const m=document.getElementById('main');
  m.innerHTML=`
    <div class="quiz-wrap">
      <div class="quiz-progress">
        <div class="qp-track"><div class="qp-fill" style="width:${pct}%"></div></div>
        <span class="qp-cnt">${QS.done}/${QS.total}</span>
      </div>
      <div class="quiz-question">
        <div class="qq-badge">🧩 객관식 퀴즈</div>
        <div class="qq-text">${q}</div>
      </div>
      <div class="quiz-opts" id="${id}">
        ${opts.map(o=>`<button class="qopt" data-g="${id}" data-c="${esc(correct)}" data-v="${esc(o)}" onclick="checkMCQ(this)">${esc(o)}</button>`).join('')}
      </div>
    </div>`;
}

function checkMCQ(btn){
  if(!QS.active)return;
  const{g,c,v}=btn.dataset;
  document.querySelectorAll(`[data-g="${g}"]`).forEach(b=>{ b.disabled=true; if(b.dataset.v===c)b.classList.add('ok'); else if(b.dataset.v===v&&v!==c)b.classList.add('ng'); });
  const ok=v===c;
  // 🆕 사운드 효과 (즉시 재생)
  if (ok) playCorrect(); else playWrong();
  setTimeout(()=>{
    const res=document.createElement('div');
    res.className='quiz-result '+(ok?'qr-ok':'qr-ng');
    if(!ok) recordWrong(QS.cur, '객관식');
    const okMsgs = ['🎉 정답!', '🌟 최고예요!', '👏 잘했어요!', '✨ 완벽해요!'];
    const ngMsgs = ['😊 다음엔 맞출 수 있어요!', '💪 한번 더 도전!', '📝 외워둬요!'];
    const okMsg = okMsgs[Math.floor(Math.random()*okMsgs.length)];
    const ngMsg = ngMsgs[Math.floor(Math.random()*ngMsgs.length)];
    res.innerHTML=`<div class="qr-icon">${ok?'🎉':'😊'}</div><div class="qr-text">${ok?`${okMsg} <strong>${esc(QS.cur.eng)}</strong> = ${esc(QS.cur.kor)}`:`${ngMsg}<br>정답은 <strong>${esc(c)}</strong>이에요. 다시 나올 거예요!<br><span style="font-size:11px;color:#991B1B;font-weight:800;background:rgba(255,255,255,.6);padding:2px 8px;border-radius:8px;display:inline-block;margin-top:4px">📝 오답노트 기록됨</span>`}</div>`;
    document.getElementById(g)?.after(res);
    QS.queue.shift();
    if(ok){ QS.done++; if(!QS.queue.length){ setTimeout(()=>endMCQ(),800); return; } }
    else{ QS.queue.splice(Math.min(2,QS.queue.length),0,QS.cur); }
    setTimeout(showMCQCard,2500);
  },300);
}
function endMCQ(){
  QS.active=false; done('mcqQuiz');
  // 🆕 오답 학습 모드면 wrong 탭으로만 복귀
  const wasWrong = window._wrongMode;
  window._wrongMode = false;
  const buttons = wasWrong
    ? `<button class="qe-btn" onclick="goTab('wrong')">❌ 오답노트로 돌아가기</button>`
    : `<button class="qe-btn" onclick="goTab('write')">✍️ 쓰기도 도전</button>
       <button class="qe-btn" onclick="goTab('home')">🏠 홈으로</button>`;
  document.getElementById('main').innerHTML=`<div class="quiz-end"><div class="qe-icon">🏆</div><div class="qe-title">${wasWrong ? '오답 복습 완료!' : '최고예요!'}</div><div class="qe-sub">모든 <strong>${QS.done}개</strong> 단어 객관식 마스터! 🌟</div>${buttons}</div>`;
}

let WQ={active:false,queue:[],done:0,total:0,cur:null,sub:null};

function renderWrite(){
  const aw=AW();
  if(!aw.length){ document.getElementById('main').innerHTML='<div class="empty-state"><div class="ei">✍️</div>활성 단어가 없어요!</div>'; return; }
  WQ={active:true,queue:shuffle(aw),done:0,total:aw.length,cur:null,sub:null};
  showWriteCard();
}
function showWriteCard(){
  if(!WQ.active||!WQ.queue.length)return;
  WQ.cur=WQ.queue[0]; WQ.sub=Math.random()<0.5?'kor':'eng';
  const w=WQ.cur;
  const pct=WQ.total>0?Math.round(WQ.done/WQ.total*100):0;
  const blank=w.eng.length<=4?'_'.repeat(w.eng.length):w.eng[0]+'_'.repeat(w.eng.length-2)+w.eng.at(-1);
  const m=document.getElementById('main');
  m.innerHTML=`
    <div class="quiz-wrap">
      <div class="quiz-progress">
        <div class="qp-track"><div class="qp-fill" style="width:${pct}%;background:var(--purple)"></div></div>
        <span class="qp-cnt" style="color:var(--purple)">${WQ.done}/${WQ.total}</span>
      </div>
      <div class="write-prompt">
        <div class="wp-badge">✍️ 쓰기 퀴즈</div>
        ${WQ.sub==='kor'
          ? `<div style="display:flex;align-items:center;gap:10px"><div class="wp-word">${esc(w.eng)}</div><button class="speak-btn" onclick="speak('${w.eng.replace(/'/g,"\\'")}',this)" style="font-size:22px">🔊</button></div><div style="font-family:'Nunito';font-size:13px;color:#6D28D9">${esc(w.pron)}</div><div class="wp-hint">💡 한국어 뜻을 입력하세요 · 첫 글자 힌트: "${esc(w.kor.length <= 2 ? getInitial(w.kor.charAt(0)) : w.kor.charAt(0))}"</div>`
          : `<div class="wp-word">${esc(w.kor)}</div><div class="wp-hint">💡 영어 단어 스펠링 · ${w.eng.length}글자 <span style="font-family:'Nunito';letter-spacing:3px;font-weight:700">${esc(blank)}</span></div>`
        }
      </div>
      <div class="write-inp-row">
        <input class="write-inp" id="wInp" placeholder="${WQ.sub==='kor'?'한국어 뜻 입력...':'영어 단어 입력...'}" autofocus autocapitalize="off" autocomplete="off"
          onkeydown="if(event.key==='Enter')submitWrite()">
        <button class="write-sub" onclick="submitWrite()">확인 →</button>
      </div>
      <div id="wResult"></div>
    </div>`;
  setTimeout(()=>document.getElementById('wInp')?.focus(), 100);
}
function submitWrite(){
  const v=(document.getElementById('wInp')?.value||'').trim(); if(!v)return;
  const w=WQ.cur;
  let ok=false;
  if(WQ.sub==='eng') ok=v.toLowerCase()===w.eng.toLowerCase();
  else{ const ks=w.kor.split(/[,，·、\s\/]+/).map(k=>k.trim()).filter(Boolean); ok=ks.some(k=>v.includes(k)||k.includes(v)); }
  // 🆕 사운드 효과
  if (ok) playCorrect(); else playWrong();
  const r=document.getElementById('wResult');
  const okMsgs = ['🎉 정답!', '🌟 최고예요!', '👏 잘했어요!'];
  const okMsg = okMsgs[Math.floor(Math.random()*okMsgs.length)];
  if(r){ r.className='quiz-result '+(ok?'qr-ok':'qr-ng'); r.innerHTML=`<div class="qr-icon">${ok?'🎉':'😊'}</div><div class="qr-text">${ok?`${okMsg} <strong>${esc(w.eng)}</strong> = ${esc(w.kor)}`:`정답: <strong>${esc(WQ.sub==='eng'?w.eng:w.kor)}</strong> · 입력: ${esc(v)}<br><span style="font-size:11px;color:#991B1B;font-weight:800;background:rgba(255,255,255,.6);padding:2px 8px;border-radius:8px;display:inline-block;margin-top:4px">📝 오답노트 기록됨</span>`}</div>`; }
  document.getElementById('wInp').disabled=true;
  document.querySelector('.write-sub').disabled=true;
  WQ.queue.shift();
  if(ok){ WQ.done++; if(!WQ.queue.length){ setTimeout(()=>endWrite(),1000); return; } }
  else { WQ.queue.splice(Math.min(2,WQ.queue.length),0,w); recordWrong(w, '쓰기'); }
  setTimeout(showWriteCard,2500);
}
function endWrite(){
  WQ.active=false; done('writingQuiz');
  // 🆕 오답 학습 모드면 wrong 탭으로만 복귀
  const wasWrong = window._wrongMode;
  window._wrongMode = false;
  const buttons = wasWrong
    ? `<button class="qe-btn" onclick="goTab('wrong')">❌ 오답노트로 돌아가기</button>`
    : `<button class="qe-btn" onclick="goTab('wrong')">❌ 틀린단어 테스트</button>
       <button class="qe-btn" onclick="goTab('home')">🏠 홈으로</button>`;
  document.getElementById('main').innerHTML=`<div class="quiz-end"><div class="qe-icon">🏆</div><div class="qe-title">${wasWrong ? '오답 복습 완료!' : '최고예요!'}</div><div class="qe-sub">모든 <strong>${WQ.done}개</strong> 단어 쓰기 마스터! 🌟</div>${buttons}</div>`;
}

async function loadWrongData() {
  if (!SL) { document.getElementById('wrongList').innerHTML = '<div class="wrong-empty"><div class="ei">👤</div>이름을 입력하고 시작하면<br>오답이 기록됩니다!</div>'; return; }
  document.getElementById('wrongLoading').style.display = 'block';
  document.getElementById('wrongList').innerHTML = '';

  // 1️⃣ Google Sheets에서 가져오기
  const res = await sheetFetch({ action: 'getMyWrongs', name: SL.name, days: wrongDays });
  document.getElementById('wrongLoading').style.display = 'none';

  let serverData = [];
  let serverOk = false;
  if (res && res.success) {
    serverData = res.wrongs || [];
    serverOk = true;
    console.log(`☁️ [시트] 오답 수신: ${serverData.length}개`);
  } else {
    console.warn('☁️ [시트] 오답 수신 실패 — 로컬 데이터만 사용');
  }

  // 2️⃣ 로컬에서도 가져오기 (시트가 실패했거나 누락된 것 보완)
  let localData = [];
  try {
    const key = wrongKey(SL.name);
    const all = JSON.parse(localStorage.getItem(key) || '[]');
    const cutoffTs = Date.now() - wrongDays * 86400000;
    localData = all.filter(r => (r.timestamp || 0) >= cutoffTs);
    console.log(`💾 [로컬] 오답 로드: ${localData.length}개`);
  } catch(e) {
    console.warn('💾 [로컬] 오답 로드 실패:', e);
  }

  // 3️⃣ 합치기 — 시트 우선, 시트에 없는 단어만 로컬에서 추가
  const merged = {};
  serverData.forEach(w => {
    const key = (w.eng||'').toLowerCase().trim();
    if (!key) return;
    if (!merged[key]) merged[key] = { ...w, count: 0, lastDate: w.date };
    merged[key].count += w.count || 1;
    if (w.date > merged[key].lastDate) merged[key].lastDate = w.date;
  });
  // 로컬 데이터는 시트에 없는 경우에만 추가 (오버카운트 방지)
  // 시트가 실패한 경우엔 로컬을 풀로 사용
  if (serverOk) {
    localData.forEach(w => {
      const key = (w.eng||'').toLowerCase().trim();
      if (!key || merged[key]) return; // 시트에 이미 있으면 스킵
      merged[key] = {
        eng: w.eng, kor: w.kor, pos: w.pos||'',
        quizType: w.quizType||'', count: 1, lastDate: w.date,
        pron: w.pron||'', ex: w.ex||'', exKor: w.exKor||'',
        _localOnly: true // 로컬에만 있는 표시
      };
    });
  } else {
    // 시트 실패 → 로컬을 풀로 사용
    localData.forEach(w => {
      const key = (w.eng||'').toLowerCase().trim();
      if (!key) return;
      if (!merged[key]) {
        merged[key] = {
          eng: w.eng, kor: w.kor, pos: w.pos||'',
          quizType: w.quizType||'', count: 0, lastDate: w.date,
          pron: w.pron||'', ex: w.ex||'', exKor: w.exKor||'',
          _localOnly: true
        };
      }
      merged[key].count += 1;
      if (w.date > merged[key].lastDate) merged[key].lastDate = w.date;
    });
  }
  wrongData = Object.values(merged).sort((a,b) => b.count - a.count);

  const labels = { 1:'오늘', 3:'최근 3일', 7:'최근 1주일', 14:'최근 2주' };
  document.getElementById('wTotalCnt').textContent = wrongData.length;
  const srcLbl = serverOk ? '' : ' · 📵 오프라인';
  document.getElementById('wPeriodLbl').textContent = (labels[wrongDays]||'') + ' 기준 | ' + SL.name + '님' + srcLbl;

  renderWrongList();
}

function getWrongWordDB() {
  return wrongData.map(w => {
    const full = WDB.find(d => d.eng.toLowerCase() === w.eng.toLowerCase());
    if (full) return { ...full, active: true };
    return {
      eng: w.eng,
      pron: w.pron || '',
      kor: w.kor,
      pos: w.pos || '',
      ex: w.ex || '',
      exKor: w.exKor || '',
      active: true
    };
  });
}

function startWrongStudy() {
  const words = getWrongWordDB();
  if (!words.length) { alert('오답 단어가 없어요!'); return; }
  markWrongTest(); // 🆕 학습로그에 현재 옵션(오늘/3일/1주/2주) 마크
  window._wrongStudyRestore = WDB;
  window._wrongMode = true;
  WDB = words;
  goTab('study');
}

function startWrongQuiz(type) {
  const words = getWrongWordDB();
  if (words.length < 2) { alert('오답 단어가 2개 이상 필요해요!'); return; }
  markWrongTest(); // 🆕 학습로그에 현재 옵션(오늘/3일/1주/2주) 마크
  window._wrongStudyRestore = WDB;
  window._wrongMode = true;
  WDB = words;
  goTab(type === 'mcq' ? 'mcq' : 'write');
}

function uploadXL(input){
  const f=input.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
      const s=/영어|eng/i.test(String(rows[0]?.[0]||''))?1:0;
      let n=0;
      for(let i=s;i<rows.length;i++){
        const r=rows[i], eng=String(r[0]||'').trim(), pron=String(r[1]||'').trim(), kor=String(r[2]||'').trim();
        const pos_=String(r[3]||'').trim(), ex_=String(r[4]||'').trim(), exKor_=String(r[5]||'').trim();
        if(eng&&kor){ const w={eng,pron:pron||'—',kor,pos:pos_||'',ex:ex_||`This is ${eng}.`,exKor:exKor_,active:true}; WDB.push(w); sheetSend({action:'addWord',eng:w.eng,pron:w.pron,kor:w.kor,pos:w.pos,ex:w.ex,exKor:w.exKor}); n++; }
      }
      try { localStorage.setItem('gnb_wc_'+GRADE,JSON.stringify(WDB)); } catch(e){}
      sheetReplaceAll(WDB);
      try { localStorage.setItem(SYNC_KEY,JSON.stringify(WDB)); } catch(e){} // 🆕 스냅샷 갱신
      renderList();
      showStatus(`✅ ${n}개 단어 추가 완료! Google Sheets에도 동기화했습니다.`, 'ok');
      setSyncPill('ok', '✅ Sheets 동기화됨');
    }catch(e){alert('오류: '+e.message);}
    input.value='';
  };
  r.readAsBinaryString(f);
}

// 🆕 V7: 기간 모드에서 from~to 날짜 범위 계산
function _getRangeBounds() {
  const now = new Date();
  let from, to = new Date(now);
  if (aRangeKey === '1w')      { from = new Date(now); from.setDate(now.getDate()-6); }
  else if (aRangeKey === '2w') { from = new Date(now); from.setDate(now.getDate()-13); }
  else if (aRangeKey === '1m') { from = new Date(now); from.setDate(now.getDate()-29); }
  else if (aRangeKey === 'tm') { from = new Date(now.getFullYear(), now.getMonth(), 1); }
  else { from = new Date(now); }
  return { from: dk(from), to: dk(to) };
}

// 🆕 V7-fix: 현재 선택된 모드/키를 사람이 읽을 수 있는 한국어 라벨로
function _getCurrentPeriodLabel() {
  if (aMode === 'date') {
    const d = new Date(aDate);
    const mm = d.getMonth()+1, dd = d.getDate();
    const map = {
      'today': `오늘 (${mm}/${dd})`,
      '1d':    `1일 전 (${mm}/${dd})`,
      '2d':    `2일 전 (${mm}/${dd})`,
      '3d':    `3일 전 (${mm}/${dd})`
    };
    return '📅 ' + (map[aRangeKey] || aDate);
  } else {
    const b = _getRangeBounds();
    const fromD = new Date(b.from), toD = new Date(b.to);
    const fLbl = `${fromD.getMonth()+1}/${fromD.getDate()}`;
    const tLbl = `${toD.getMonth()+1}/${toD.getDate()}`;
    const map = {
      '1w': `📅 지난 1주간 (${fLbl} ~ ${tLbl})`,
      '2w': `📅 지난 2주간 (${fLbl} ~ ${tLbl})`,
      '1m': `📅 지난 1달간 (${fLbl} ~ ${tLbl})`,
      'tm': `📅 이번 달 (${fromD.getFullYear()}년 ${fromD.getMonth()+1}월)`
    };
    return map[aRangeKey] || '';
  }
}

async function loadLogs(){
  const c=document.getElementById('admContent'); if(!c)return;
  c.innerHTML='<div class="loading-state"><span class="spin"></span>불러오는 중...</div>';

  // 🆕 V7-fix: 헤더에 현재 기간 표시
  const periodEl = document.getElementById('admPeriod');
  if (periodEl) periodEl.textContent = _getCurrentPeriodLabel();

  let logs=[], source='local';

  if (aMode === 'date') {
    const r=await sheetFetch({action:'read',date:aDate});
    if(r&&r.success){ logs=r.logs||[]; source='sheets'; }
    else {
      try { logs=JSON.parse(localStorage.getItem('gnb_logs_'+GRADE)||'[]').filter(l=>l.date===aDate); } catch(e){ logs=[]; }
      source='local';
    }
  } else {
    // 🆕 기간 모드
    const r = await sheetFetch({action:'read'});
    const bounds = _getRangeBounds();
    if (r && r.success) {
      logs = (r.logs||[]).filter(l => l.date && l.date >= bounds.from && l.date <= bounds.to);
      source='sheets';
    } else {
      try {
        const all = JSON.parse(localStorage.getItem('gnb_logs_'+GRADE)||'[]');
        logs = all.filter(l => l.date && l.date >= bounds.from && l.date <= bounds.to);
      } catch(e) { logs = []; }
      source='local';
    }
  }

  const srcBadge=source==='sheets'
    ? `<div class="src-badge" style="font-size:11.5px;background:#DCFCE7;color:#166534;border:1px solid #86EFAC;border-radius:9px;padding:5px 11px;font-weight:800;margin-bottom:4px">☁️ Google Sheets 실시간 데이터${aMode==='range'?' · 기간 집계':''}</div>`
    : `<div class="src-badge" style="font-size:11.5px;background:#FEF3C7;color:#92400E;border:1px solid #FDE68A;border-radius:9px;padding:5px 11px;font-weight:800;margin-bottom:4px">📱 로컬 데이터 (이 기기만 표시) — Sheets 연결 필요</div>`;

  const sum=document.getElementById('admSum');
  const summaryEl = document.getElementById('studentSummary');
  if(!logs.length){
    if(sum)sum.innerHTML='';
    if(summaryEl)summaryEl.innerHTML='';
    c.innerHTML=srcBadge+'<div class="empty-state"><div class="ei">📭</div>해당 기간의 접속 기록이 없어요.</div>';
    return;
  }
  const names=new Set(logs.map(l=>l.name)), mins=logs.reduce((s,l)=>s+(+l.studyMinutes||0),0), allDone=logs.filter(l=>l.wordStudy&&l.mcqQuiz&&l.writingQuiz).length;
  if(sum)sum.innerHTML=`<div class="adm-card"><div class="n">${names.size}</div><div class="l">접속 학생</div></div><div class="adm-card"><div class="n">${logs.length}</div><div class="l">총 세션</div></div><div class="adm-card"><div class="n">${mins}분</div><div class="l">총 학습</div></div><div class="adm-card"><div class="n">${allDone}</div><div class="l">전과목 완료</div></div>`;
  const ox=v=>v?'<span class="ox-o">O</span>':'<span class="ox-x">X</span>';

  // 🆕 V7-fix: 학생별 집계 (접속 수, 총 학습 분, 단어/객관식/쓰기/틀단 횟수)
  const stuMap = {};
  logs.forEach(l => {
    const k = l.name || '(이름없음)';
    if (!stuMap[k]) {
      stuMap[k] = { name: k, sessions: 0, minutes: 0,
        word: 0, mcq: 0, write: 0,
        wToday: 0, w3d: 0, w1w: 0, w2w: 0 };
    }
    const s = stuMap[k];
    s.sessions++;
    s.minutes += +l.studyMinutes || 0;
    if (l.wordStudy)   s.word++;
    if (l.mcqQuiz)     s.mcq++;
    if (l.writingQuiz) s.write++;
    if (l.wrongToday)  s.wToday++;
    if (l.wrong3days)  s.w3d++;
    if (l.wrong1week)  s.w1w++;
    if (l.wrong2weeks) s.w2w++;

  const stuList = Object.values(stuMap).sort((a,b) => b.minutes - a.minutes);

  // 학생별 요약 표 렌더링
  if (summaryEl) {
    summaryEl.innerHTML = `
      <div class="sec" style="margin-top:14px">학생별 요약 (학습 시간순)</div>
      <div style="overflow-x:auto">
        <table class="summary-tbl">
          <thead><tr>
            <th>이름</th>
            <th>접속<br>횟수</th>
            <th>총 학습<br>시간</th>
            <th>단어</th>
            <th>객관식</th>
            <th>쓰기</th>
            <th>틀단<br>총횟수</th>
          </tr></thead>
          <tbody>
            ${stuList.map(s => {
              const wrongTotal = s.wToday + s.w3d + s.w1w + s.w2w;
              return `<tr>
                <td class="s-name clickable-name" onclick="openStudentReport('${esc(s.name).replace(/'/g,"\\'")}')" title="클릭해서 리포트 보기">${esc(s.name)}</td>
                <td class="s-big">${s.sessions}회</td>
                <td class="s-mins">${s.minutes}분</td>
                <td>${s.word||'—'}</td>
                <td>${s.mcq||'—'}</td>
                <td>${s.write||'—'}</td>
                <td>${wrongTotal||'—'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  // 🆕 기간 모드: 날짜 컬럼 추가
  const dateCol = aMode === 'range' ? '<th>날짜</th>' : '';
  const dateCell = (l) => aMode === 'range' ? `<td style="font-size:10.5px;color:var(--muted)">${l.date||''}</td>` : '';

  c.innerHTML=srcBadge+`<div class="sec" style="margin-top:14px">세션별 상세 로그</div><div style="overflow-x:auto"><table class="log-tbl"><thead><tr><th>이름</th>${dateCol}<th>접속</th><th>나감</th><th>학습</th><th>단어</th><th>객관식</th><th>쓰기</th><th>틀단<br>오늘</th><th>틀단<br>3일</th><th>틀단<br>1주</th><th>틀단<br>2주</th></tr></thead><tbody>${logs.map(l=>`<tr><td class="clickable-name" onclick="openStudentReport('${esc(l.name).replace(/'/g,"\\'")}')" title="클릭해서 리포트 보기">${esc(l.name)}</td>${dateCell(l)}<td>${l.loginTime||'—'}</td><td>${l.logoutTime||'진행중'}</td><td>${l.studyMinutes?l.studyMinutes+'분':'—'}</td><td>${ox(l.wordStudy)}</td><td>${ox(l.mcqQuiz)}</td><td>${ox(l.writingQuiz)}</td><td>${ox(l.wrongToday)}</td><td>${ox(l.wrong3days)}</td><td>${ox(l.wrong1week)}</td><td>${ox(l.wrong2weeks)}</td></tr>`).join('')}</tbody></table></div>`;
}
